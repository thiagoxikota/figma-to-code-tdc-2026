<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prepare sua máquina · Do Figma ao código sem handoff · TDC 2026</title>
<meta name="robots" content="noindex" />
<style>
  :root {
    --bg: #0E0C0B;
    --panel: #171210;
    --panel-2: #201813;
    --ink: #FFFFFF;
    --ink-2: #F1EAE1;
    --ink-3: #C9BFB4;
    --brand: #DC000C;
    --brand-bright: #FF3B2F;
    --ok: #2FBF71;
    --warn: #E8A317;
    --rule: #4A413B;
    --font: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", "Roboto Mono", Menlo, Consolas, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg); color: var(--ink); font-family: var(--font);
    line-height: 1.55; font-size: 18px; -webkit-font-smoothing: antialiased;
    padding-bottom: 64px;
  }
  a { color: var(--brand-bright); }
  button { font-family: inherit; cursor: pointer; }
  :focus-visible { outline: 3px solid var(--brand-bright); outline-offset: 2px; border-radius: 4px; }
  .wrap { max-width: 760px; margin: 0 auto; padding: 0 20px; }

  /* topo fixo: URL curta + progresso */
  .topbar {
    position: sticky; top: 0; z-index: 20; background: rgba(14,12,11,0.96);
    border-bottom: 2px solid var(--rule); backdrop-filter: blur(6px);
  }
  .topbar .wrap { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 20px; flex-wrap: wrap; }
  .short { font-weight: 800; font-size: 16px; letter-spacing: 0.3px; }
  .short .u { color: var(--brand-bright); }
  .copybtn {
    background: var(--panel-2); color: var(--ink); border: 2px solid var(--rule);
    border-radius: 999px; padding: 8px 16px; font-weight: 700; font-size: 14px; min-height: 40px;
  }
  .copybtn:hover { border-color: var(--brand); }
  .copybtn.done { border-color: var(--ok); color: var(--ok); }

  .progress { height: 8px; background: var(--panel); }
  .progress .fill { height: 100%; background: var(--brand); transition: width .3s ease; }

  /* trilho de etapas */
  .rail { display: flex; flex-wrap: wrap; gap: 8px; padding: 16px 0 4px; }
  .rail .node {
    font-size: 13px; font-weight: 800; padding: 6px 12px; border-radius: 999px;
    border: 2px solid var(--rule); color: var(--ink-3); white-space: nowrap;
  }
  .rail .node.done { border-color: var(--ok); color: var(--ok); }
  .rail .node.cur { border-color: var(--brand-bright); color: var(--ink); background: rgba(220,0,12,0.16); }

  h1 { font-size: clamp(30px, 6vw, 46px); font-weight: 900; line-height: 1.05; letter-spacing: -0.5px; margin: 28px 0 10px; }
  h2 { font-size: clamp(22px, 4.4vw, 30px); font-weight: 900; line-height: 1.12; margin: 0 0 6px; }
  .lede { font-size: clamp(18px, 2.6vw, 21px); color: var(--ink-2); margin-bottom: 24px; }
  .eyebrow { font-size: 13px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: var(--brand-bright); }

  .choices { display: grid; gap: 16px; margin: 24px 0; }
  @media (min-width: 560px) { .choices.two { grid-template-columns: 1fr 1fr; } .choices.three { grid-template-columns: 1fr 1fr 1fr; } }
  .choice {
    text-align: left; background: var(--panel); border: 3px solid var(--rule); border-radius: 18px;
    padding: 24px; color: var(--ink); display: flex; flex-direction: column; gap: 8px; min-height: 108px;
  }
  .choice:hover { border-color: var(--brand); background: var(--panel-2); }
  .choice .big { font-size: 22px; font-weight: 900; }
  .choice .small { font-size: 15px; color: var(--ink-3); }

  .card {
    background: var(--panel); border: 3px solid var(--rule); border-radius: 18px;
    padding: 24px; margin: 20px 0;
  }
  .why { color: var(--ink-2); font-size: 16px; border-left: 4px solid var(--brand); padding-left: 14px; margin: 8px 0 18px; }
  .why b { color: var(--ink); }

  .block { margin: 16px 0; }
  .block p { color: var(--ink-2); margin: 8px 0; }
  .codewrap { position: relative; }
  pre {
    background: #0A0807; border: 2px solid var(--rule); border-radius: 12px; padding: 18px 16px;
    overflow-x: auto; font-family: var(--mono); font-size: 15px; color: var(--ink); line-height: 1.5;
  }
  .codelabel { font-size: 12px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--ink-3); margin-bottom: 6px; }
  .code-copy { position: absolute; top: 10px; right: 10px; }
  .path { font-family: var(--mono); font-size: 14px; background: #0A0807; border: 2px solid var(--rule); border-radius: 8px; padding: 10px 12px; word-break: break-all; }

  .note { border-radius: 12px; padding: 14px 16px; margin: 14px 0; font-size: 16px; border: 2px solid; }
  .note.neutral { border-color: var(--rule); background: var(--panel-2); color: var(--ink-2); }
  .note.warn { border-color: var(--warn); background: rgba(232,163,23,0.12); color: #FFE6B0; }
  .note.ok { border-color: var(--ok); background: rgba(47,191,113,0.12); color: #BEF2D6; }

  .shot { border: 2px dashed var(--rule); border-radius: 12px; padding: 0; margin: 14px 0; overflow: hidden; background: var(--panel-2); }
  .shot img { display: block; width: 100%; height: auto; }
  .shot .ph { padding: 28px 16px; text-align: center; color: var(--ink-3); font-size: 14px; }
  .shot figcaption { font-size: 13px; color: var(--ink-3); padding: 8px 12px; border-top: 1px solid var(--rule); }

  .checklist { list-style: none; display: flex; flex-direction: column; gap: 10px; margin: 18px 0; }
  .checklist li { display: flex; gap: 12px; align-items: flex-start; }
  .checklist input { width: 24px; height: 24px; margin-top: 2px; accent-color: var(--brand); flex: 0 0 auto; }
  .checklist label { font-size: 17px; color: var(--ink); }

  .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
  .btn { border-radius: 12px; padding: 14px 20px; font-weight: 800; font-size: 17px; border: 3px solid transparent; min-height: 52px; }
  .btn.primary { background: var(--brand); color: #fff; }
  .btn.primary:hover { background: var(--brand-bright); }
  .btn.ghost { background: transparent; color: var(--ink-2); border-color: var(--rule); }
  .btn.ghost:hover { border-color: var(--ink-3); }
  .btn.help { background: transparent; color: var(--warn); border-color: var(--warn); }

  .tokenrow { display: flex; gap: 8px; align-items: center; margin: 12px 0; }
  .tokenrow input {
    flex: 1; background: #0A0807; border: 2px solid var(--rule); border-radius: 10px;
    color: var(--ink); font-family: var(--mono); font-size: 15px; padding: 12px; min-height: 48px;
  }
  .tokenrow button { background: var(--panel-2); border: 2px solid var(--rule); border-radius: 10px; color: var(--ink); padding: 0 14px; min-height: 48px; font-weight: 700; }

  .stepmeta { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 4px; }
  .stepmeta .n { font-size: 14px; font-weight: 800; color: var(--brand-bright); letter-spacing: 1px; }
  .stepmeta .est { font-size: 14px; color: var(--ink-3); }

  /* modal de ajuda */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.72); z-index: 50; display: none; align-items: center; justify-content: center; padding: 20px; }
  .overlay.open { display: flex; }
  .modal { background: var(--panel); border: 3px solid var(--brand); border-radius: 18px; max-width: 520px; width: 100%; padding: 24px; max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 24px; font-weight: 900; margin-bottom: 10px; }
  .modal .field { margin: 14px 0; }
  .modal label { display: block; font-weight: 800; margin-bottom: 6px; }
  .modal input, .modal select { width: 100%; background: #0A0807; border: 2px solid var(--rule); border-radius: 10px; color: var(--ink); padding: 12px; font-size: 16px; min-height: 48px; }
  .helpbanner { background: var(--brand); color: #fff; border-radius: 12px; padding: 16px; font-weight: 800; font-size: 18px; margin: 16px 0; }
  .helpsummary { font-family: var(--mono); font-size: 14px; color: var(--ink-2); background: #0A0807; border: 2px solid var(--rule); border-radius: 10px; padding: 12px; }

  .footcta { margin: 28px 0; display: flex; gap: 10px; flex-wrap: wrap; }
  .muted { color: var(--ink-3); font-size: 15px; }
  hr.sep { border: none; border-top: 2px solid var(--rule); margin: 28px 0; }

  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>
  <div class="topbar">
    <div class="progress"><div class="fill" id="progressFill" style="width:0%"></div></div>
    <div class="wrap">
      <div class="short">No computador, abra <span class="u" id="shortUrl">thiagoxikota.com/tdc</span></div>
      <button class="copybtn" id="copyUrl">Copiar link</button>
    </div>
  </div>

  <main class="wrap" id="app" aria-live="polite"></main>

  <div class="overlay" id="helpOverlay" role="dialog" aria-modal="true" aria-labelledby="helpTitle">
    <div class="modal">
      <h3 id="helpTitle">Preciso de ajuda</h3>
      <p class="muted">Levante a mão. Enquanto o apoio não chega, pare de mexer na configuração. Mostre esta tela pra ele.</p>
      <div class="helpbanner">Aguarde o apoio. Não mude mais nada agora.</div>
      <div class="field">
        <label for="mesa">Mesa / máquina</label>
        <input id="mesa" type="text" placeholder="ex: Fila 2, máquina 7 (ou Reserva 1)" />
      </div>
      <div class="field">
        <label for="cat">O que travou?</label>
        <select id="cat">
          <option>Não consigo entrar no Figma</option>
          <option>Não consigo entrar no Claude</option>
          <option>Não consigo criar o token</option>
          <option>Não encontro o Edit Config</option>
          <option>JSON inválido</option>
          <option>Claude não mostra o MCP</option>
          <option>O plugin (Bridge) não abre</option>
          <option>O Bridge não conecta</option>
          <option>O Claude não lê o frame</option>
          <option>O projeto não abre</option>
          <option>O resultado não aparece</option>
          <option>Outro problema</option>
        </select>
      </div>
      <div class="helpsummary" id="helpSummary"></div>
      <div class="actions">
        <button class="btn primary" id="helpClose">Voltar</button>
        <button class="btn ghost" id="helpReserva">Ir para máquina reserva</button>
      </div>
    </div>
  </div>

<script>
(function () {
  "use strict";

  var SHORT_URL = "thiagoxikota.com/tdc";       // URL curta final (Thi confirma o host)
  var STORAGE = "tdc-workshop-onboarding-v1";   // nunca guarda token
  var TEST_PROMPT = "Verifique o status da conexão com o Figma";
  var READ_PROMPT = "Leia o frame \"Tela demo\" deste arquivo Figma via MCP. Devolva a árvore de camadas, os componentes e os tokens (variáveis) aplicados. Descreva estrutura e semântica, não pixels.";
  var GEN_PROMPT = "Gere um componente Card em React + TypeScript, function component. Props tipadas: title, description, imageUrl?, onClick?. Estados default, hover, focus-visible e disabled. Acessibilidade: article, heading por prop, foco visível de 2px, alvo mínimo de 44px, contraste AA. Sem libs externas.\nAntes de gerar, leia o frame \"Tela demo\" deste arquivo Figma via MCP e use os tokens (cor, espaçamento, tipografia, raio) e a estrutura de lá. Não invente valores; puxe do Figma. Devolva só o arquivo Card.tsx.";
  var COMPARE_PROMPT = "Compare o componente renderizado no preview com o frame do Figma. Aja como o designer do sistema: liste onde o código divergiu da intenção (espaçamento, cor, tipografia, hierarquia), citando o token correto. Ignore qualidade de código, foque em fidelidade.";
  var FIX_PROMPT = "Consulte de novo o frame \"Tela demo\" via MCP. Explique a diferença que escolhemos corrigir e ajuste só ela no Card.tsx, usando o token certo. Preserve o que já está correto. Não reescreva o resto.";

  var CONFIG_JSON =
'{\n' +
'  "mcpServers": {\n' +
'    "figma-console": {\n' +
'      "command": "npx",\n' +
'      "args": ["-y", "figma-console-mcp@1.35.0"],\n' +
'      "env": {\n' +
'        "FIGMA_ACCESS_TOKEN": "figd_SEU_TOKEN_AQUI",\n' +
'        "ENABLE_MCP_APPS": "true"\n' +
'      }\n' +
'    }\n' +
'  }\n' +
'}';

  var TOKEN_HELP = "Figma > menu do usuário (canto superior esquerdo) > Settings > Security > Personal access tokens > Generate new token. Escopos: file content, file variables, file comments. O token aparece uma vez só; copie na hora. Ele começa com figd_.";

  // ---- estado (token NUNCA entra aqui nem no localStorage) ----
  var state = { view: "cover", device: null, os: null, setupIdx: 0, practiceIdx: 0, done: {}, checked: {}, mesa: "" };
  var tokenLocal = ""; // só na memória da aba, nunca persistido, nunca enviado

  function save() {
    try {
      localStorage.setItem(STORAGE, JSON.stringify({
        view: state.view, device: state.device, os: state.os,
        setupIdx: state.setupIdx, practiceIdx: state.practiceIdx,
        done: state.done, checked: state.checked, mesa: state.mesa
      }));
    } catch (e) {}
  }
  function load() {
    try {
      var s = JSON.parse(localStorage.getItem(STORAGE) || "null");
      if (s && typeof s === "object") { for (var k in s) if (k in state) state[k] = s[k]; }
    } catch (e) {}
  }

  function detectOs() {
    var p = (navigator.platform || navigator.userAgent || "").toLowerCase();
    if (p.indexOf("win") > -1) return "windows";
    if (p.indexOf("linux") > -1 && p.indexOf("android") === -1) return "linux";
    return "mac";
  }

  // ---------- passos de setup por rota ----------
  function isMac() { return state.os === "mac"; }
  function osPath(win, mac) { return isMac() ? mac : win; }

  function stepFigma() {
    return { key: "figma", rail: "Figma", est: "2 min",
      title: "Entre no Figma Desktop",
      why: "O Claude vai ler o <b>seu</b> arquivo do Figma. Sem login, não há o que ler.",
      blocks: [
        { type: "text", text: "Abra o Figma Desktop (o app, não o navegador: o plugin bridge só roda no Desktop) e entre com a sua conta. A gratuita serve." },
        { type: "link", href: "https://www.figma.com/community/file/1659374868260259462", label: "Abrir o arquivo da demo (duplique pra sua conta)" },
        { type: "note", tone: "neutral", text: "Depois de duplicar, deixe o arquivo aberto na página \"Tela demo\"." }
      ],
      checklist: ["Figma Desktop aberto e logado", "Arquivo da demo duplicado e aberto"] };
  }
  function stepClaude() {
    return { key: "claude", rail: "Claude", est: "2 min",
      title: "Entre no Claude Desktop",
      why: "O Claude Desktop é o cliente que fala com o MCP. No navegador (claude.ai) a integração não funciona.",
      blocks: [
        { type: "text", text: "Abra o Claude Desktop e entre com a sua conta." },
        { type: "note", tone: "warn", text: "É o app Claude Desktop, não o claude.ai no navegador. O bridge é local e o site não enxerga ele." }
      ],
      checklist: ["Claude Desktop aberto e logado"] };
  }
  function stepToken() {
    return { key: "token", rail: "Token", est: "3 min",
      title: "Gere seu token do Figma",
      why: "O token deixa o MCP ler o arquivo com a <b>sua</b> permissão. Ele fica só na sua máquina.",
      blocks: [
        { type: "text", text: TOKEN_HELP },
        { type: "shot", src: "assets/figma-token.webp", cap: "Settings > Security > Personal access tokens" },
        { type: "note", tone: "warn", text: "Segurança: o token não passa por esta página, nem por link, nem pelos organizadores. Guarde só pra você. Se aparecer projetado, revogue e gere outro." }
      ],
      checklist: ["Token gerado", "Começa com figd_", "Copiado num lugar seguro"] };
  }
  function stepMcpEvent() {
    return { key: "mcp", rail: "MCP", est: "3 min",
      title: "Conecte o Claude ao Figma (script pronto)",
      why: "Esta máquina já tem o atalho. O script insere só a entrada do MCP, faz backup e nunca imprime seu token.",
      blocks: [
        { type: "text", text: "Na área de trabalho, clique com o botão direito em <b>setup-figma-mcp.ps1</b> e escolha \"Run with PowerShell\". Cole o token quando pedir (ele não aparece na tela) e Enter." },
        { type: "note", tone: "ok", text: "Deu certo quando aparecer: figma-console adicionado. Agora feche o Claude Desktop por completo e abra de novo." }
      ],
      checklist: ["Rodei o script", "Vi \"figma-console adicionado\"", "Fechei e reabri o Claude Desktop"] };
  }
  function stepMcpOwn() {
    return { key: "mcp", rail: "MCP", est: "5 min",
      title: "Conecte o Claude ao Figma",
      why: "O MCP é o que deixa o Claude consultar o Figma. Ele roda por npx, sem instalar nada global.",
      blocks: [
        { type: "text", text: "Jeito guiado (recomendado): baixe os scripts do kit e rode o de setup. Ele faz backup, preserva outros MCP e pede o token escondido." },
        { type: "cmd", label: osPath("PowerShell (botão direito > Run with PowerShell)", "Terminal (ou duplo-clique no .command)"),
          value: osPath("powershell -ExecutionPolicy Bypass -File setup-figma-mcp.ps1", "./setup-figma-mcp.command") },
        { type: "text", text: "Jeito manual: abra o config e cole a entrada abaixo dentro de mcpServers (troque o token). Depois salve." },
        { type: "path", value: osPath("%APPDATA%\\Claude\\claude_desktop_config.json", "~/Library/Application Support/Claude/claude_desktop_config.json") },
        { type: "json" },
        { type: "note", tone: "warn", text: "Já tem outros MCP no arquivo? Não apague. Só acrescente a chave figma-console dentro de mcpServers." },
        { type: "note", tone: "ok", text: "Salvou? Feche o Claude Desktop por completo " + osPath("(sair de vez, não só a janela)", "(Cmd+Q)") + " e abra de novo. O MCP só carrega no boot." }
      ],
      checklist: ["Entrada figma-console salva no config", "Token colado (começa com figd_)", "Fechei e reabri o Claude Desktop"] };
  }
  function stepBridge() {
    var pluginPath = osPath("%USERPROFILE%\\.figma-console-mcp\\plugin\\manifest.json", "~/.figma-console-mcp/plugin/manifest.json");
    if (state.device === "event") {
      return { key: "bridge", rail: "Bridge", est: "2 min",
        title: "Ligue o plugin Bridge no Figma",
        why: "O plugin é a ponte entre o Figma Desktop e o MCP. Sem ele aberto, o Claude não alcança o arquivo.",
        blocks: [
          { type: "text", text: "No Figma Desktop: Plugins > Development > rode o <b>Figma Console MCP Bridge</b> (já importado nesta máquina). Deixe o plugin aberto." },
          { type: "text", text: "Selecione o frame <b>Tela demo</b> antes de testar." }
        ],
        checklist: ["Plugin Bridge rodando", "Frame \"Tela demo\" selecionado"] };
    }
    return { key: "bridge", rail: "Bridge", est: "4 min",
      title: "Importe e ligue o plugin Bridge",
      why: "O MCP empacota o plugin sozinho no primeiro boot do Claude. Você só importa e roda.",
      blocks: [
        { type: "text", text: "No Figma Desktop: Plugins > Development > Import plugin from manifest... e selecione o manifest deste caminho:" },
        { type: "path", value: pluginPath },
        { type: "note", tone: "neutral", text: "A pasta só existe depois que o Claude Desktop subiu com o config salvo (passo anterior). Se ela não estiver lá, reabra o Claude e espere alguns segundos." },
        { type: "text", text: "Rode o plugin e deixe aberto. Depois selecione o frame <b>Tela demo</b>." },
        { type: "shot", src: "assets/figma-import-plugin.webp", cap: "Plugins > Development > Import plugin from manifest" }
      ],
      checklist: ["Plugin importado", "Plugin rodando e aberto", "Frame \"Tela demo\" selecionado"] };
  }
  function stepPrereq() {
    return { key: "prereq", rail: "Pré-req", est: "5 min",
      title: "Confira o que precisa estar instalado",
      why: "Quatro coisas sustentam o fluxo. Se faltar uma, o resto trava depois. Melhor pegar agora.",
      blocks: [
        { type: "text", text: "No terminal, confirme o Node 18 ou mais novo:" },
        { type: "cmd", label: "terminal", value: "node -v" },
        { type: "link", href: "https://nodejs.org", label: "Node.js (se faltar ou for antigo)" },
        { type: "link", href: "https://www.figma.com/downloads/", label: "Figma Desktop" },
        { type: "link", href: "https://claude.ai/download", label: "Claude Desktop" },
        { type: "note", tone: "neutral", text: "Numa máquina do trabalho pode faltar permissão de instalar. Se travar aí, senta em dupla ou usa uma máquina reserva." }
      ],
      checklist: ["Node 18+ (node -v respondeu)", "Figma Desktop instalado", "Claude Desktop instalado", "Contas do Figma e do Claude prontas"] };
  }
  function stepTeste() {
    return { key: "teste", rail: "Teste", est: "3 min",
      title: "Teste a conexão de verdade",
      why: "Não basta o MCP aparecer na lista. O teste real é o Claude <b>ler o frame</b> e devolver dado do arquivo.",
      blocks: [
        { type: "text", text: "No Claude Desktop, conversa nova, mande:" },
        { type: "cmd", label: "no Claude", value: TEST_PROMPT },
        { type: "note", tone: "ok", text: "Sucesso = resposta confirmando conexão via WebSocket Bridge, com o nome do arquivo." },
        { type: "text", text: "Agora prove que ele lê o design:" },
        { type: "cmd", label: "no Claude", value: READ_PROMPT },
        { type: "note", tone: "neutral", text: "Certo quando ele devolve o nome do frame, as camadas e os tokens. Aí você está pronto pra prática." }
      ],
      checklist: ["Respondeu conectado via Bridge", "Devolveu a estrutura do frame Tela demo"] };
  }

  function setupSteps() {
    if (state.device === "event") {
      return [stepFigma(), stepClaude(), stepToken(), stepMcpEvent(), stepBridge(), stepTeste()];
    }
    // computador próprio (windows ou mac)
    return [stepPrereq(), stepFigma(), stepClaude(), stepToken(), stepMcpOwn(), stepBridge(), stepTeste()];
  }

  // ---------- prática (6 etapas, iguais em qualquer rota) ----------
  function practiceSteps() {
    return [
      { key: "p-ler", rail: "Ler", est: "3 min", title: "1. Leia o Figma", why: "A IA descreve estrutura e tokens do frame, não pixels.",
        blocks: [{ type: "cmd", label: "no Claude", value: READ_PROMPT }],
        checklist: ["Voltou árvore de camadas", "Voltou componentes e tokens"] },
      { key: "p-gerar", rail: "Gerar", est: "6 min", title: "2. Gere o componente", why: "Mesmo pedido de sempre, só que agora com a fonte certa: o Figma via MCP.",
        blocks: [{ type: "cmd", label: "no Claude", value: GEN_PROMPT }],
        checklist: ["Gerou o Card.tsx", "As cores vieram de token, não de hex cru"] },
      { key: "p-abrir", rail: "Abrir", est: "4 min", title: "3. Abra o resultado", why: "Ver o componente rodando fecha o ciclo. Um comando só.",
        blocks: [
          { type: "text", text: "Cole o Card.tsx gerado em src/components/Card.tsx e rode o preview:" },
          { type: "cmd", label: "terminal, na pasta do projeto", value: "npm run workshop:start" },
          { type: "note", tone: "neutral", text: "Abre em localhost:5173. O slot 2 mostra o seu componente." }
        ],
        checklist: ["Preview abriu", "O card renderiza no slot"] },
      { key: "p-comparar", rail: "Comparar", est: "4 min", title: "4. Compare com o Figma", why: "Achar onde divergiu é o trabalho que a IA não faz por você.",
        blocks: [{ type: "cmd", label: "no Claude", value: COMPARE_PROMPT }],
        checklist: ["Achamos pelo menos 3 divergências", "Cada uma tem o token certo citado"] },
      { key: "p-corrigir", rail: "Corrigir", est: "4 min", title: "5. Corrija uma falha", why: "Consultar a fonte de novo e ajustar só o que escolhemos. Sem reescrever o resto.",
        blocks: [
          { type: "cmd", label: "no Claude", value: FIX_PROMPT },
          { type: "text", text: "Valide de forma objetiva:" },
          { type: "cmd", label: "terminal", value: "npm run workshop:check" }
        ],
        checklist: ["Corrigimos uma falha", "workshop:check passou (typecheck + token)"] },
      { key: "p-concluir", rail: "Fechou", est: "2 min", title: "6. Feche o ciclo", why: "Você conectou, leu, gerou, comparou e corrigiu. É o pipeline inteiro, na sua mão.",
        blocks: [
          { type: "note", tone: "ok", text: "Fez o ciclo real: Figma Desktop conectado ao Claude Desktop pelo MCP, leu um frame, gerou, comparou e corrigiu." },
          { type: "text", text: "Antes de sair, restaure o projeto e (na máquina do evento) revogue seu token:" },
          { type: "cmd", label: "terminal", value: "npm run workshop:reset" },
          { type: "text", text: "Revogar o token: Figma > Settings > Security > Personal access tokens > Revoke. E, se quiser, tire o MCP do config:" },
          { type: "cmd", label: "terminal", value: "npm run workshop:setup-mcp -- --remove" }
        ],
        checklist: ["Conectei", "Li", "Gerei", "Comparei", "Corrigi"] }
    ];
  }

  // ---------- helpers de render ----------
  function el(tag, cls, html) { var e = document.createElement(tag); if (cls) e.className = cls; if (html != null) e.innerHTML = html; return e; }
  function esc(s) { return String(s).replace(/[&<>"]/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]; }); }

  function copyText(text, btn) {
    function ok() { if (btn) { var t = btn.textContent; btn.textContent = "Copiado"; btn.classList.add("done"); setTimeout(function () { btn.textContent = t; btn.classList.remove("done"); }, 1800); } }
    if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(text).then(ok, function () { fallback(text, ok); }); }
    else fallback(text, ok);
  }
  function fallback(text, ok) { var ta = document.createElement("textarea"); ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0"; document.body.appendChild(ta); ta.select(); try { document.execCommand("copy"); ok(); } catch (e) {} document.body.removeChild(ta); }

  function renderBlock(b) {
    if (b.type === "text") { var p = el("div", "block"); p.appendChild(el("p", null, b.text)); return p; }
    if (b.type === "note") { return el("div", "note " + (b.tone || "neutral"), b.text); }
    if (b.type === "path") {
      var w = el("div", "block codewrap");
      w.appendChild(el("div", "path", esc(b.value)));
      var cb = el("button", "copybtn code-copy", "Copiar"); cb.onclick = function () { copyText(b.value, cb); }; w.appendChild(cb);
      return w;
    }
    if (b.type === "cmd" || b.type === "json") {
      var val = b.type === "json" ? CONFIG_JSON.replace("figd_SEU_TOKEN_AQUI", tokenLocal ? tokenLocal : "figd_SEU_TOKEN_AQUI") : b.value;
      var wrap = el("div", "block");
      if (b.label || b.type === "json") wrap.appendChild(el("div", "codelabel", b.label || "claude_desktop_config.json"));
      var cw = el("div", "codewrap");
      cw.appendChild(el("pre", null, esc(val)));
      var btn = el("button", "copybtn code-copy", "Copiar"); btn.onclick = function () { copyText(val, btn); };
      cw.appendChild(btn);
      wrap.appendChild(cw);
      if (b.type === "json") wrap.appendChild(tokenField());
      return wrap;
    }
    if (b.type === "link") { var d = el("div", "block"); var a = el("a", null, esc(b.label) + " (abre em nova aba)"); a.href = b.href; a.target = "_blank"; a.rel = "noopener"; d.appendChild(a); return d; }
    if (b.type === "shot") {
      var fig = el("figure", "shot");
      var img = new Image(); img.alt = b.cap || "";
      img.onerror = function () { fig.innerHTML = ""; fig.appendChild(el("div", "ph", "imagem: " + esc(b.cap || b.src))); };
      img.src = b.src; fig.appendChild(img);
      if (b.cap) fig.appendChild(el("figcaption", null, esc(b.cap)));
      return fig;
    }
    return el("div");
  }

  function tokenField() {
    var box = el("div", "block");
    box.appendChild(el("div", "note neutral", "Opcional: cole o token aqui pra preencher o JSON acima. Ele fica só neste navegador, nunca sai da máquina, nunca é salvo. Prefere não colar? Deixe em branco e troque figd_SEU_TOKEN_AQUI direto no arquivo."));
    var row = el("div", "tokenrow");
    var input = el("input"); input.type = "password"; input.placeholder = "figd_..."; input.value = tokenLocal; input.setAttribute("aria-label", "token do Figma (fica local)");
    var eye = el("button", null, "Ver"); eye.type = "button";
    eye.onclick = function () { if (input.type === "password") { input.type = "text"; eye.textContent = "Ocultar"; } else { input.type = "password"; eye.textContent = "Ver"; } };
    input.oninput = function () { tokenLocal = input.value; var pre = box.parentNode.querySelector("pre"); if (pre) pre.textContent = CONFIG_JSON.replace("figd_SEU_TOKEN_AQUI", tokenLocal ? tokenLocal : "figd_SEU_TOKEN_AQUI"); };
    row.appendChild(input); row.appendChild(eye);
    box.appendChild(row);
    return box;
  }

  function renderRail() {
    var rail = el("div", "rail");
    var steps = setupSteps();
    var node = el("span", "node" + (state.device ? " done" : " cur"), "Dispositivo");
    rail.appendChild(node);
    for (var i = 0; i < steps.length; i++) {
      var cls = "node";
      if (state.view === "setup" && i === state.setupIdx) cls += " cur";
      else if (state.done["setup:" + steps[i].key]) cls += " done";
      rail.appendChild(el("span", cls, steps[i].rail));
    }
    rail.appendChild(el("span", "node" + (state.view === "practice" ? " cur" : ""), "Prática"));
    rail.appendChild(el("span", "node" + (state.view === "done" ? " cur" : ""), "Pronto"));
    return rail;
  }

  function totalUnits() { return setupSteps().length + practiceSteps().length; }
  function doneCount() { var n = 0; for (var k in state.done) if (state.done[k]) n++; return n; }
  function updateProgress() { var pct = Math.round((doneCount() / totalUnits()) * 100); document.getElementById("progressFill").style.width = pct + "%"; }

  // ---------- telas ----------
  function viewCover(app) {
    app.appendChild(el("div", "eyebrow", "Do Figma ao código sem handoff · TDC 2026"));
    app.appendChild(el("h1", null, "Prepare sua máquina"));
    app.appendChild(el("p", "lede", "Dez a quinze minutos de setup e você faz o fluxo real: o Claude lendo o seu Figma, gerando código e você corrigindo. Como você vai participar?"));
    var ch = el("div", "choices two");
    ch.appendChild(choiceBtn("Máquina do evento", "Windows já com Figma, Claude e Node. Só faltam suas contas.", function () { state.device = "event"; state.os = "windows"; go("setup"); }));
    ch.appendChild(choiceBtn("Meu próprio computador", "Você traz o notebook. A gente confere o que precisa.", function () { state.device = "own"; go("os"); }));
    app.appendChild(ch);
    app.appendChild(twoDeviceNote());
  }

  function viewOs(app) {
    app.appendChild(el("div", "eyebrow", "Seu computador"));
    app.appendChild(el("h1", null, "Qual sistema?"));
    var guess = detectOs();
    var label = guess === "windows" ? "Windows" : (guess === "linux" ? "Linux" : "macOS");
    app.appendChild(el("p", "lede", "Detectamos <b>" + label + "</b>. Confirme ou corrija."));
    var ch = el("div", "choices three");
    ch.appendChild(choiceBtn("Windows", "Fluxo completo.", function () { state.os = "windows"; go("setup"); }));
    ch.appendChild(choiceBtn("macOS", "Fluxo completo, caminhos do Mac.", function () { state.os = "mac"; go("setup"); }));
    ch.appendChild(choiceBtn("Linux", "Leia antes de começar.", function () { state.os = "linux"; go("linux"); }));
    app.appendChild(ch);
    app.appendChild(backBtn(function () { state.device = null; go("cover"); }));
  }

  function viewLinux(app) {
    app.appendChild(el("div", "eyebrow", "Linux"));
    app.appendChild(el("h1", null, "No Linux, seja em dupla"));
    app.appendChild(el("div", "note warn", "Este fluxo depende do Figma Desktop e do plugin Bridge, que não têm suporte real e testado no Linux. Não vale gastar quinze minutos pra descobrir isso no meio do setup."));
    var c = el("div", "card");
    c.appendChild(el("h2", null, "O que fazer agora"));
    var ul = el("ul", "checklist");
    ["Sente com alguém em Windows ou macOS e faça o exercício na máquina dele.", "Ou peça uma máquina reserva do evento (Windows, já preparada).", "Você acompanha, especifica e valida junto: a parte que mais importa é a decisão, e essa é sua."].forEach(function (t) {
      var li = el("li"); li.appendChild(el("span", null, "&#8226;")); li.appendChild(el("label", null, t)); ul.appendChild(li);
    });
    c.appendChild(ul);
    app.appendChild(c);
    app.appendChild(el("p", "muted", "Quer rodar em casa depois? O kit tem o passo a passo e o mesmo arquivo do Figma."));
    app.appendChild(backBtn(function () { go("os"); }));
  }

  function viewStep(app, step, idx, total, kind) {
    app.appendChild(renderRail());
    var meta = el("div", "stepmeta");
    meta.appendChild(el("span", "n", (kind === "practice" ? "PRÁTICA " : "PASSO ") + (idx + 1) + " de " + total));
    if (step.est) meta.appendChild(el("span", "est", "~" + step.est));
    app.appendChild(meta);
    app.appendChild(el("h1", null, esc(step.title)));
    if (step.why) app.appendChild(el("div", "why", step.why));

    step.blocks.forEach(function (b) { app.appendChild(renderBlock(b)); });

    if (step.checklist && step.checklist.length) {
      var ul = el("ul", "checklist");
      step.checklist.forEach(function (item, i) {
        var id = kind + ":" + step.key + ":" + i;
        var li = el("li");
        var input = el("input"); input.type = "checkbox"; input.id = id; input.checked = !!state.checked[id];
        input.onchange = function () { state.checked[id] = input.checked; save(); };
        var lb = el("label"); lb.setAttribute("for", id); lb.innerHTML = esc(item);
        li.appendChild(input); li.appendChild(lb); ul.appendChild(li);
      });
      app.appendChild(ul);
    }

    var actions = el("div", "actions");
    var next = el("button", "btn primary", idx + 1 < total ? "Funcionou, próximo" : (kind === "setup" ? "Setup pronto, ir pra prática" : "Concluir"));
    next.onclick = function () {
      state.done[kind + ":" + step.key] = true;
      if (idx + 1 < total) { if (kind === "setup") state.setupIdx = idx + 1; else state.practiceIdx = idx + 1; }
      else { go(kind === "setup" ? "practice" : "done"); return; }
      go(kind === "setup" ? "setup" : "practice");
    };
    var err = el("button", "btn ghost", "Deu erro");
    err.onclick = function () { openHelp(step); };
    var help = el("button", "btn help", "Preciso de ajuda");
    help.onclick = function () { openHelp(step); };
    actions.appendChild(next); actions.appendChild(err); actions.appendChild(help);
    app.appendChild(actions);

    if (idx > 0) app.appendChild(backBtn(function () {
      if (kind === "setup") { state.setupIdx = idx - 1; go("setup"); }
      else { state.practiceIdx = idx - 1; go("practice"); }
    }));
  }

  function viewDone(app) {
    app.appendChild(renderRail());
    app.appendChild(el("div", "eyebrow", "Pronto"));
    app.appendChild(el("h1", null, "Você fez o fluxo inteiro"));
    app.appendChild(el("p", "lede", "Figma Desktop conectado ao Claude Desktop pelo MCP. Leu um frame de verdade, gerou, comparou e corrigiu. Isso é o \"do Figma ao código\" sem handoff."));
    var c = el("div", "card");
    c.appendChild(el("h2", null, "Antes de sair"));
    c.appendChild(el("div", "note ok", "Restaure o projeto: npm run workshop:reset. Nada de credencial é apagado."));
    c.appendChild(el("div", "note warn", "Na máquina do evento: revogue seu token no Figma (Settings > Security > Revoke) e saia das suas contas."));
    c.appendChild(el("div", "block")).appendChild(el("p", null, "Quer levar pra casa? O kit tem os 10 prompts, o arquivo do Figma, os scripts e o troubleshooting."));
    app.appendChild(c);
    app.appendChild(backBtn(function () { state.practiceIdx = practiceSteps().length - 1; go("practice"); }));
  }

  // ---------- botões utilitários ----------
  function choiceBtn(big, small, onclick) {
    var b = el("button", "choice");
    b.appendChild(el("span", "big", esc(big)));
    b.appendChild(el("span", "small", esc(small)));
    b.onclick = onclick;
    return b;
  }
  function backBtn(onclick) { var d = el("div", "footcta"); var b = el("button", "btn ghost", "Voltar"); b.onclick = onclick; d.appendChild(b); return d; }
  function twoDeviceNote() {
    var d = el("div", "note neutral");
    d.innerHTML = "Abriu no celular? Perfeito pra ler. As ações são no computador: digite <b>" + esc(SHORT_URL) + "</b> lá pra abrir este mesmo guia. Seu progresso fica salvo em cada aparelho.";
    return d;
  }

  // ---------- ajuda ----------
  function openHelp(step) {
    var ov = document.getElementById("helpOverlay");
    var mesa = document.getElementById("mesa");
    mesa.value = state.mesa || "";
    mesa.oninput = function () { state.mesa = mesa.value; save(); updateHelpSummary(step); };
    document.getElementById("cat").onchange = function () { updateHelpSummary(step); };
    updateHelpSummary(step);
    ov.classList.add("open");
    document.getElementById("helpClose").focus();
  }
  function updateHelpSummary(step) {
    var dev = state.device === "event" ? "Máquina do evento" : "Computador próprio";
    var os = state.os ? state.os : "-";
    document.getElementById("helpSummary").textContent =
      "Mesa: " + (state.mesa || "-") + "  |  " + dev + " / " + os + "  |  Etapa: " + (step ? step.title : "-") + "  |  Erro: " + document.getElementById("cat").value;
  }

  // ---------- roteamento ----------
  function go(view) { state.view = view; save(); render(); window.scrollTo(0, 0); }

  function render() {
    var app = document.getElementById("app");
    app.innerHTML = "";
    if (state.view === "cover") viewCover(app);
    else if (state.view === "os") viewOs(app);
    else if (state.view === "linux") viewLinux(app);
    else if (state.view === "setup") {
      var s = setupSteps(); var i = Math.min(state.setupIdx, s.length - 1); state.setupIdx = i;
      viewStep(app, s[i], i, s.length, "setup");
    } else if (state.view === "practice") {
      var p = practiceSteps(); var j = Math.min(state.practiceIdx, p.length - 1); state.practiceIdx = j;
      viewStep(app, p[j], j, p.length, "practice");
    } else if (state.view === "done") viewDone(app);
    else viewCover(app);
    updateProgress();
  }

  // ---------- init ----------
  document.getElementById("shortUrl").textContent = SHORT_URL;
  document.getElementById("copyUrl").onclick = function () { copyText("https://" + SHORT_URL, this); };
  document.getElementById("helpClose").onclick = function () { document.getElementById("helpOverlay").classList.remove("open"); };
  document.getElementById("helpReserva").onclick = function () {
    document.getElementById("helpOverlay").classList.remove("open");
    var app = document.getElementById("app");
    app.innerHTML = "";
    app.appendChild(el("div", "eyebrow", "Máquina reserva"));
    app.appendChild(el("h1", null, "Migre em dois minutos"));
    app.appendChild(el("div", "note neutral", "Pegue uma máquina Reserva (identificada Reserva 1, 2, 3...). Ela já está ligada, com Figma, Claude, Node, o projeto e o plugin prontos. Você só entra nas suas contas, gera o token e conecta."));
    app.appendChild(backBtn(function () { render(); }));
  };
  document.getElementById("helpOverlay").addEventListener("click", function (e) { if (e.target === this) this.classList.remove("open"); });
  document.addEventListener("keydown", function (e) { if (e.key === "Escape") document.getElementById("helpOverlay").classList.remove("open"); });

  load();
  render();
})();
</script>
</body>
</html>
