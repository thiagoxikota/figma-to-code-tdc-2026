<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Prepare sua máquina · Do Figma ao código sem handoff · TDC 2026</title>
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#F4F1EC" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#14110E" media="(prefers-color-scheme: dark)" />
<style>
  /* ============================================================
     Do Figma ao código sem handoff · TDC 2026
     Assistente de setup. 100% offline (abre por file://), zero
     recurso externo. O token e digitado aqui e processado SO neste
     navegador pra montar o JSON: nao e transmitido, nao entra em URL,
     nao vai pra analytics e nao e persistido (nem localStorage nem
     sessionStorage). Some ao fechar a aba. Como a pagina nao carrega
     nenhum recurso externo, nao ha script de terceiro que possa le-lo.
     Sistema visual Xikota: vermilion #DC000C, ground washi claro,
     Ma (respiro), Kanso (uma coisa por tela), alto contraste real.
     ============================================================ */

  :root {
    /* ground washi + tinta */
    --bg: #F4F1EC;
    --bg-2: #EBE6DD;
    --sunk: #17130F;        /* poço escuro para código (contraste com washi) */
    --panel: #FFFFFF;
    --ink: #17130F;
    --ink-2: #4A423B;
    --ink-3: #6B6157;
    /* marca */
    --brand: #DC000C;
    --brand-deep: #A4000A;
    --brand-wash: rgba(220, 0, 12, 0.06);
    --on-brand: #FFFFFF;
    /* estado (sempre com ícone/texto, nunca só cor) */
    --ok: #1F7A44;
    --ok-wash: rgba(31, 122, 68, 0.10);
    --warn: #9A5B00;
    --warn-wash: rgba(154, 91, 0, 0.10);
    /* linhas e sombra (separação por luz, nunca por apagar) */
    --rule: #DDD5C9;
    --rule-2: #C9BEAE;
    --shadow: 0 1px 2px rgba(23,19,15,.05), 0 10px 30px -16px rgba(23,19,15,.20);
    --shadow-lift: 0 2px 4px rgba(23,19,15,.06), 0 18px 42px -18px rgba(23,19,15,.28);
    --focus: #DC000C;
    --font: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", "Roboto Mono", Menlo, Consolas, monospace;
    --maxw: 720px;
    --radius: 18px;
    --radius-sm: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14110E;
      --bg-2: #1B1611;
      --sunk: #0C0A08;
      --panel: #1F1A15;
      --ink: #F7F2EA;
      --ink-2: #D2C8BB;
      --ink-3: #9C9083;
      --brand: #FF4438;
      --brand-deep: #FF6A55;
      --brand-wash: rgba(255, 68, 56, 0.10);
      --on-brand: #14110E;
      --ok: #46C97A;
      --ok-wash: rgba(70, 201, 122, 0.12);
      --warn: #E8A94B;
      --warn-wash: rgba(232, 169, 75, 0.12);
      --rule: #3A322B;
      --rule-2: #4A4038;
      --shadow: 0 1px 2px rgba(0,0,0,.4), 0 12px 30px -16px rgba(0,0,0,.6);
      --shadow-lift: 0 2px 4px rgba(0,0,0,.5), 0 20px 44px -18px rgba(0,0,0,.7);
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
  body {
    background: var(--bg); color: var(--ink); font-family: var(--font);
    line-height: 1.55; font-size: 18px; -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility; min-height: 100vh;
    padding-bottom: 56px;
  }
  a { color: var(--brand-deep); text-underline-offset: 3px; }
  button { font-family: inherit; cursor: pointer; color: inherit; }
  :focus-visible { outline: 3px solid var(--focus); outline-offset: 3px; border-radius: 6px; }
  ::selection { background: var(--brand); color: #fff; }
  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 22px; }
  .hidden { display: none !important; }

  /* ---------- cabeçalho fino ---------- */
  .topbar {
    position: sticky; top: 0; z-index: 30;
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    -webkit-backdrop-filter: saturate(1.1) blur(10px);
    backdrop-filter: saturate(1.1) blur(10px);
    border-bottom: 1px solid var(--rule);
  }
  .topbar .bar {
    max-width: var(--maxw); margin: 0 auto; padding: 12px 22px;
    display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap;
  }
  .lockup { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .hinomaru {
    width: 15px; height: 15px; border-radius: 50%; flex: 0 0 auto;
    background: var(--brand); box-shadow: 0 0 0 4px var(--brand-wash);
  }
  .lockup .name { font-size: 13px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink); white-space: nowrap; }
  .lockup .name .sep { color: var(--brand); padding: 0 6px; }
  .urlcue {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .urlcue .txt { font-size: 13.5px; font-weight: 600; color: var(--ink-2); }
  .urlcue .txt b { color: var(--ink); font-weight: 800; }
  .urlcue .txt .u { color: var(--brand-deep); font-weight: 800; }
  .copybtn {
    background: var(--panel); color: var(--ink); border: 1.5px solid var(--rule-2);
    border-radius: 999px; padding: 7px 15px; font-weight: 700; font-size: 13px; min-height: 38px;
    display: inline-flex; align-items: center; gap: 7px; transition: border-color .15s, color .15s;
  }
  .copybtn:hover { border-color: var(--brand); }
  .copybtn.done { border-color: var(--ok); color: var(--ok); }
  .copybtn svg { width: 14px; height: 14px; }

  /* ---------- medidor de progresso ---------- */
  .meterbox { max-width: var(--maxw); margin: 0 auto; padding: 0 22px 12px; }
  .meterhead { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin: 4px 0 8px; }
  .meterhead .phase { font-size: 12px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--brand-deep); }
  .meterhead .count { font-size: 13px; font-weight: 700; color: var(--ink-3); }
  .segs { display: flex; gap: 6px; }
  .segs .seg { flex: 1; height: 7px; border-radius: 99px; background: var(--bg-2); box-shadow: inset 0 0 0 1px var(--rule); transition: background .25s; }
  .segs .seg.done { background: var(--brand); box-shadow: none; }
  .segs .seg.cur { background: var(--brand); box-shadow: 0 0 0 3px var(--brand-wash); }

  /* ---------- palco ---------- */
  main { display: block; }
  .stage { max-width: var(--maxw); margin: 0 auto; padding: 26px 22px 0; }
  .stage.center { min-height: calc(100vh - 190px); display: flex; flex-direction: column; justify-content: center; }

  h1 { font-size: clamp(32px, 6vw, 52px); font-weight: 900; line-height: 1.02; letter-spacing: -1px; margin: 0 0 12px; }
  h1:focus-visible { outline: none; }
  h2 { font-size: clamp(21px, 4vw, 27px); font-weight: 900; line-height: 1.14; margin: 0 0 8px; }
  .eyebrow { font-size: 12.5px; font-weight: 800; letter-spacing: 2.5px; text-transform: uppercase; color: var(--brand-deep); margin-bottom: 14px; }
  .lede { font-size: clamp(17px, 2.4vw, 20px); color: var(--ink-2); line-height: 1.5; margin-bottom: 4px; max-width: 42ch; }

  /* respiro entre blocos: separação por espaço, não por régua fraca */
  .stage > * + * { margin-top: 20px; }

  /* ---------- capa ---------- */
  .cover { position: relative; }
  .cover .disc {
    position: absolute; right: -60px; top: -70px; width: 260px; height: 260px; border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, var(--brand-wash), transparent 68%);
    pointer-events: none; z-index: 0;
  }
  .cover .disc::after {
    content: ""; position: absolute; inset: 78px; border-radius: 50%;
    border: 2px solid var(--brand); opacity: .16;
  }
  .cover > * { position: relative; z-index: 1; }

  .choices { display: grid; gap: 16px; }
  @media (min-width: 620px) { .choices.two { grid-template-columns: 1fr 1fr; } }
  .choice {
    text-align: left; background: var(--panel); border: 1px solid var(--rule); border-radius: var(--radius);
    padding: 24px; color: var(--ink); display: flex; flex-direction: column; gap: 8px; min-height: 118px;
    box-shadow: var(--shadow); position: relative; overflow: hidden;
    transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  }
  .choice::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; background: var(--brand); transform: scaleY(0); transform-origin: top; transition: transform .18s ease; }
  .choice:hover { transform: translateY(-3px); box-shadow: var(--shadow-lift); border-color: var(--rule-2); }
  .choice:hover::before { transform: scaleY(1); }
  .choice .big { font-size: 22px; font-weight: 900; letter-spacing: -.3px; display: flex; align-items: center; gap: 10px; }
  .choice .big .arrow { color: var(--brand); font-weight: 900; margin-left: auto; transition: transform .15s; }
  .choice:hover .big .arrow { transform: translateX(4px); }
  .choice .small { font-size: 15px; color: var(--ink-2); line-height: 1.45; }
  .choice .badge { align-self: flex-start; font-size: 11.5px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; padding: 4px 10px; border-radius: 999px; margin-top: 2px; }
  .choice .badge.fast { background: var(--ok-wash); color: var(--ok); }
  .choice .badge.none { background: var(--brand-wash); color: var(--brand-deep); }

  /* ---------- passo ---------- */
  .stepmeta { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; margin-bottom: 4px; }
  .stepmeta .n { font-size: 12.5px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--brand-deep); }
  .stepmeta .est { font-size: 13px; font-weight: 700; color: var(--ink-3); display: inline-flex; align-items: center; gap: 6px; }
  .stepmeta .est::before { content: ""; width: 5px; height: 5px; border-radius: 50%; background: var(--rule-2); }

  .why { color: var(--ink); font-size: 16.5px; line-height: 1.5; background: var(--brand-wash); border-left: 4px solid var(--brand); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 14px 18px; }
  .why b { font-weight: 800; }

  .prose p { color: var(--ink-2); font-size: 17px; line-height: 1.55; }
  .prose p b { color: var(--ink); font-weight: 800; }

  /* código / json */
  .codeblock .label { font-size: 12px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--ink-3); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .codewrap { position: relative; }
  pre {
    background: var(--sunk); color: #F7F2EA; border-radius: var(--radius-sm); padding: 18px 16px;
    overflow-x: auto; font-family: var(--mono); font-size: 14.5px; line-height: 1.55;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
  }
  .code-copy { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,.10); color: #fff; border-color: rgba(255,255,255,.22); }
  .code-copy:hover { border-color: #fff; }
  .code-copy.done { border-color: #7ee2a6; color: #7ee2a6; }
  .path { font-family: var(--mono); font-size: 14px; background: var(--sunk); color: #F7F2EA; border-radius: var(--radius-sm); padding: 13px 14px; padding-right: 92px; word-break: break-all; }

  /* notas de estado */
  .note { border-radius: var(--radius-sm); padding: 14px 16px 14px 46px; font-size: 15.5px; line-height: 1.5; position: relative; border: 1px solid; }
  .note::before { position: absolute; left: 15px; top: 14px; font-weight: 900; font-size: 15px; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; }
  .note.neutral { background: var(--bg-2); border-color: var(--rule); color: var(--ink-2); padding-left: 16px; }
  .note.warn { background: var(--warn-wash); border-color: color-mix(in srgb, var(--warn) 40%, transparent); color: var(--ink); }
  .note.warn::before { content: "!"; background: var(--warn); }
  .note.ok { background: var(--ok-wash); border-color: color-mix(in srgb, var(--ok) 40%, transparent); color: var(--ink); }
  .note.ok::before { content: "✓"; background: var(--ok); }
  .note b { font-weight: 800; }

  /* diagrama honesto (trilha de menu, não screenshot fake) */
  .diagram { background: var(--panel); border: 1px solid var(--rule); border-radius: var(--radius-sm); padding: 18px; box-shadow: var(--shadow); }
  .diagram .dlabel { font-size: 12px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--ink-3); margin-bottom: 12px; }
  .trail { display: flex; flex-wrap: wrap; align-items: center; gap: 7px; }
  .trail .chip { font-size: 14px; font-weight: 700; color: var(--ink); background: var(--bg-2); border: 1px solid var(--rule-2); border-radius: 8px; padding: 7px 11px; white-space: nowrap; }
  .trail .chip.end { background: var(--brand); color: #fff; border-color: var(--brand); }
  .trail .chev { color: var(--ink-3); font-weight: 900; }
  .diagram .dfoot { margin-top: 12px; font-size: 13.5px; color: var(--ink-3); }
  .fakefield { margin-top: 12px; display: flex; align-items: center; gap: 10px; background: var(--bg-2); border: 1px dashed var(--rule-2); border-radius: 8px; padding: 10px 12px; font-family: var(--mono); font-size: 14px; color: var(--ink-2); }
  .fakefield .dot { color: var(--brand); font-weight: 900; letter-spacing: 2px; }

  /* campo de token (local, nunca sai) */
  .tokenfield { background: var(--panel); border: 1px solid var(--rule); border-radius: var(--radius-sm); padding: 16px; box-shadow: var(--shadow); }
  .tokenfield .hint { font-size: 14px; color: var(--ink-2); line-height: 1.5; margin-bottom: 12px; }
  .tokenfield .hint b { color: var(--ink); font-weight: 800; }
  .tokenrow { display: flex; gap: 8px; align-items: center; }
  .tokenrow input {
    flex: 1; min-width: 0; background: var(--bg-2); border: 1.5px solid var(--rule-2); border-radius: 10px;
    color: var(--ink); font-family: var(--mono); font-size: 15px; padding: 12px; min-height: 48px;
  }
  .tokenrow input::placeholder { color: var(--ink-3); }
  .tokenrow .eye { background: var(--bg-2); border: 1.5px solid var(--rule-2); border-radius: 10px; color: var(--ink); padding: 0 14px; min-height: 48px; font-weight: 700; font-size: 14px; }
  .tokenrow .eye:hover { border-color: var(--brand); }

  /* checklist de validação */
  .checkcard { background: var(--panel); border: 1px solid color-mix(in srgb, var(--ok) 30%, var(--rule)); border-radius: var(--radius-sm); padding: 16px 18px; box-shadow: var(--shadow); }
  .checkcard .clabel { font-size: 12px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--ok); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .checklist { list-style: none; display: flex; flex-direction: column; gap: 12px; }
  .checklist li { display: flex; gap: 12px; align-items: flex-start; }
  .checklist input { width: 24px; height: 24px; margin-top: 1px; accent-color: var(--ok); flex: 0 0 auto; cursor: pointer; }
  .checklist label { font-size: 16.5px; color: var(--ink); line-height: 1.4; cursor: pointer; }
  .checkcard .allset { margin-top: 12px; font-size: 13.5px; font-weight: 800; color: var(--ok); display: none; align-items: center; gap: 8px; }
  .checkcard.complete .allset { display: flex; }

  .link { display: inline-flex; align-items: center; gap: 8px; font-weight: 700; font-size: 16px; color: var(--brand-deep); background: var(--panel); border: 1px solid var(--rule); border-radius: var(--radius-sm); padding: 13px 16px; box-shadow: var(--shadow); transition: border-color .15s; text-decoration: none; }
  .link:hover { border-color: var(--brand); }
  .link .ext { margin-left: auto; color: var(--ink-3); font-size: 13px; }

  /* ações */
  .actions { display: flex; flex-wrap: wrap; gap: 12px; }
  .btn { border-radius: var(--radius-sm); padding: 14px 22px; font-weight: 800; font-size: 16.5px; border: 2px solid transparent; min-height: 52px; display: inline-flex; align-items: center; gap: 9px; transition: transform .12s, background .15s, border-color .15s; }
  .btn:active { transform: translateY(1px); }
  .btn.primary { background: var(--brand); color: var(--on-brand); box-shadow: 0 10px 24px -12px var(--brand); }
  .btn.primary:hover { background: var(--brand-deep); }
  .btn.ghost { background: var(--panel); color: var(--ink); border-color: var(--rule-2); }
  .btn.ghost:hover { border-color: var(--ink-3); }
  .btn.help { background: transparent; color: var(--warn); border-color: color-mix(in srgb, var(--warn) 55%, transparent); }
  .btn.help:hover { border-color: var(--warn); }
  .btn .arrow { font-weight: 900; }

  .backrow { margin-top: 8px; }
  .backbtn { background: transparent; border: none; color: var(--ink-3); font-weight: 700; font-size: 15px; padding: 8px 0; display: inline-flex; align-items: center; gap: 8px; min-height: 44px; }
  .backbtn:hover { color: var(--ink); }

  .muted { color: var(--ink-3); font-size: 15px; line-height: 1.5; }
  .card { background: var(--panel); border: 1px solid var(--rule); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
  .card > * + * { margin-top: 14px; }

  /* ---------- modal de ajuda ---------- */
  .overlay { position: fixed; inset: 0; background: rgba(23,19,15,0.55); z-index: 60; display: none; align-items: flex-end; justify-content: center; padding: 0; }
  @media (min-width: 620px) { .overlay { align-items: center; padding: 24px; } }
  .overlay.open { display: flex; }
  .modal {
    background: var(--panel); border: 1px solid var(--rule-2); border-top: 4px solid var(--brand);
    border-radius: var(--radius) var(--radius) 0 0; max-width: 520px; width: 100%; padding: 24px 22px 28px;
    max-height: 92vh; overflow-y: auto; box-shadow: var(--shadow-lift);
  }
  @media (min-width: 620px) { .modal { border-radius: var(--radius); } }
  .modal h3 { font-size: 24px; font-weight: 900; margin-bottom: 8px; }
  .modal .sub { color: var(--ink-2); font-size: 15.5px; line-height: 1.5; }
  .helpbanner { background: var(--brand); color: #fff; border-radius: var(--radius-sm); padding: 15px 16px; font-weight: 800; font-size: 17px; margin: 16px 0; display: flex; align-items: center; gap: 10px; }
  .helpbanner .hm { width: 12px; height: 12px; border-radius: 50%; background: #fff; flex: 0 0 auto; }
  .field { margin: 14px 0; }
  .field label { display: block; font-weight: 800; margin-bottom: 6px; font-size: 15px; }
  .field input, .field select { width: 100%; background: var(--bg-2); border: 1.5px solid var(--rule-2); border-radius: 10px; color: var(--ink); padding: 12px; font-size: 16px; min-height: 48px; }
  .helpsummary { font-family: var(--mono); font-size: 13px; color: var(--ink-2); background: var(--bg-2); border: 1px solid var(--rule); border-radius: 10px; padding: 12px; line-height: 1.5; margin: 12px 0 16px; }

  /* ---------- animação (respeita reduce) ---------- */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  .stage > * { animation: fadeUp .34s ease both; }
  .stage > *:nth-child(2) { animation-delay: .03s; }
  .stage > *:nth-child(3) { animation-delay: .06s; }
  .stage > *:nth-child(4) { animation-delay: .09s; }
  .stage > *:nth-child(n+5) { animation-delay: .12s; }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; scroll-behavior: auto !important; }
  }
</style>
</head>
<body>
  <header class="topbar">
    <div class="bar">
      <div class="lockup">
        <span class="hinomaru" aria-hidden="true"></span>
        <span class="name">TDC 2026<span class="sep">·</span>Setup</span>
      </div>
      <div class="urlcue">
        <span class="txt">No computador, abra <b class="u" id="shortUrl">thiagoxikota.com/tdc</b></span>
        <button class="copybtn" id="copyUrl" type="button" aria-label="Copiar o link do guia">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><rect x="9" y="9" width="11" height="11" rx="2" stroke="currentColor" stroke-width="2"/><path d="M5 15V5a2 2 0 0 1 2-2h8" stroke="currentColor" stroke-width="2"/></svg>
          <span class="lbl">Copiar link</span>
        </button>
      </div>
    </div>
    <div class="meterbox" id="meterbox" hidden>
      <div class="meterhead">
        <span class="phase" id="meterPhase">Setup</span>
        <span class="count" id="meterCount"></span>
      </div>
      <div class="segs" id="segs" role="progressbar" aria-label="Progresso do setup"></div>
    </div>
  </header>

  <main>
    <div class="stage" id="app" aria-live="polite"></div>
  </main>

  <div class="overlay" id="helpOverlay" role="dialog" aria-modal="true" aria-labelledby="helpTitle">
    <div class="modal">
      <h3 id="helpTitle">Preciso de ajuda</h3>
      <p class="sub">Levante a mão. Enquanto o apoio não chega, pare de mexer na configuração. Mostre esta tela pra ele.</p>
      <div class="helpbanner"><span class="hm" aria-hidden="true"></span>Aguarde o apoio. Não mude mais nada agora.</div>
      <div class="field">
        <label for="mesa">Mesa / máquina</label>
        <input id="mesa" type="text" placeholder="ex: Fila 2, máquina 7 (ou Reserva 1)" />
      </div>
      <div class="field">
        <label for="cat">O que travou?</label>
        <select id="cat">
          <option>Não consigo entrar no Figma</option>
          <option>Não consigo entrar no Claude</option>
          <option>Não consigo criar o token</option>
          <option>Não encontro o Edit Config</option>
          <option>JSON inválido</option>
          <option>Claude não mostra o MCP</option>
          <option>O plugin (Bridge) não abre</option>
          <option>O Bridge não conecta</option>
          <option>O Claude não lê o frame</option>
          <option>O projeto não abre</option>
          <option>O resultado não aparece</option>

  function el(tag, cls, html) { var e = document.createElement(tag); if (cls) e.className = cls; if (html != null) e.innerHTML = html; return e; }

  function copyText(text, btn) {

    if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(text).then(ok, function () { fallback(text, ok); }); }
    else fallback(text, ok);
  }
  function setLabel(btn, txt) { var l = btn.querySelector(".lbl"); if (l) l.textContent = txt; else btn.textContent = txt; }
  function fallback(text, ok) { var ta = document.createElement("textarea"); ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0"; document.body.appendChild(ta); ta.select(); try { document.execCommand("copy"); ok(); } catch (e) {} document.body.removeChild(ta); }

  function copyBtn(cls, getText) {

    return b;
  }

  function renderBlock(b) {
    if (b.type === "text") { var p = el("div", "prose"); p.appendChild(el("p", null, b.text)); return p; }
    if (b.type === "note") { return el("div", "note " + (b.tone || "neutral"), b.text); }
    if (b.type === "path") {
      var w = el("div", "codewrap");
      w.appendChild(el("div", "path", esc(b.value)));
      w.appendChild(copyBtn("code-copy", function () { return b.value; }));
      return w;
    }
    if (b.type === "cmd" || b.type === "json") {
      var getVal = function () { return b.type === "json" ? CONFIG_JSON.replace("figd_SEU_TOKEN_AQUI", tokenLocal ? tokenLocal : "figd_SEU_TOKEN_AQUI") : b.value; };
      var wrap = el("div", "codeblock");
      wrap.appendChild(el("div", "label", esc(b.label || "claude_desktop_config.json")));
      var cw = el("div", "codewrap");
      var pre = el("pre", null, esc(getVal()));
      cw.appendChild(pre);
      cw.appendChild(copyBtn("code-copy", getVal));
      wrap.appendChild(cw);
      if (b.type === "json") wrap.appendChild(tokenField(pre));
      return wrap;
    }
    if (b.type === "link") {
      var a = el("a", "link"); a.href = b.href; a.target = "_blank"; a.rel = "noopener noreferrer";
      a.appendChild(el("span", null, esc(b.label)));
      a.appendChild(el("span", "ext", "abre em nova aba"));
      return a;
    }
    if (b.type === "diagram") {
      var d = el("div", "diagram");
      d.appendChild(el("div", "dlabel", esc(b.dlabel || "")));
      var tr = el("div", "trail");
      b.trail.forEach(function (c, i) {
        if (i > 0) tr.appendChild(el("span", "chev", "›"));
        tr.appendChild(el("span", "chip" + (i === b.trail.length - 1 ? " end" : ""), esc(c)));
      });
      d.appendChild(tr);
      if (b.field) {
        var ff = el("div", "fakefield");
        ff.appendChild(el("span", null, esc(b.field)));
        ff.appendChild(el("span", "dot", "• • • • • • • •"));
        d.appendChild(ff);
      }
      if (b.foot) d.appendChild(el("div", "dfoot", esc(b.foot)));
      return d;
    }
    return el("div");
  }

  function tokenField(preEl) {
    var box = el("div", "tokenfield");
    box.appendChild(el("div", "hint", "Opcional: cole o token aqui pra preencher o JSON acima. Ele fica <b>só neste navegador</b>, nunca sai da máquina, nunca é salvo. Prefere não colar? Deixe em branco e troque figd_SEU_TOKEN_AQUI direto no arquivo."));

    row.appendChild(input); row.appendChild(eye);

    cov.appendChild(el("div", "eyebrow", "Do Figma ao código sem handoff · TDC 2026"));
    cov.appendChild(el("h1", null, "Prepare sua máquina"));
    cov.appendChild(el("p", "lede", "Uns quinze minutos de setup na máquina do evento (um pouco mais no seu) e você faz o fluxo real: o Claude lendo o seu Figma, gerando código e você corrigindo. Como você vai participar?"));
    var ch = el("div", "choices two");
    ch.appendChild(choiceBtn("Máquina do evento", "Windows com Figma, Claude e Node já instalados. O token, o MCP e o plugin você monta aqui, guiado.", "apps prontos", "fast", function () { state.device = "event"; state.os = "windows"; go("setup"); }));
    ch.appendChild(choiceBtn("Meu próprio computador", "Você traz o notebook. A gente confere o que precisa.", null, null, function () { state.device = "own"; go("os"); }));
    cov.appendChild(ch);
    cov.appendChild(twoDeviceNote());
    app.appendChild(cov);
  }

  function viewOs(app) {
    app.className = "stage";
    app.appendChild(el("div", "eyebrow", "Seu computador"));
    app.appendChild(el("h1", null, "Qual sistema?"));
    var guess = detectOs();
    var label = guess === "windows" ? "Windows" : (guess === "linux" ? "Linux" : "macOS");
    app.appendChild(el("p", "lede", "Detectamos <b>" + label + "</b>. Confirme ou corrija."));
    var ch = el("div", "choices");
    ch.appendChild(choiceBtn("Windows", "Fluxo completo.", null, null, function () { state.os = "windows"; go("setup"); }));
    ch.appendChild(choiceBtn("macOS", "Fluxo completo, caminhos do Mac.", null, null, function () { state.os = "mac"; go("setup"); }));
    ch.appendChild(choiceBtn("Linux", "Leia antes de começar.", null, null, function () { state.os = "linux"; go("linux"); }));
    app.appendChild(ch);
    app.appendChild(backRow(function () { state.device = null; go("cover"); }));
  }

  function viewLinux(app) {
    app.className = "stage";
    app.appendChild(el("div", "eyebrow", "Linux"));
    app.appendChild(el("h1", null, "No Linux, seja em dupla"));
    app.appendChild(el("div", "note warn", "Este fluxo depende do Figma Desktop e do plugin Bridge, que não têm suporte real e testado no Linux. Não vale gastar quinze minutos pra descobrir isso no meio do setup."));
    var c = el("div", "card");
    c.appendChild(el("h2", null, "O que fazer agora"));
    var ul = el("ul", "checklist");
    ["Sente com alguém em Windows ou macOS e faça o exercício na máquina dele.", "Ou peça uma máquina reserva do evento (Windows, já preparada).", "Você acompanha, especifica e valida junto: a parte que mais importa é a decisão, e essa é sua."].forEach(function (t) {
      var li = el("li"); li.appendChild(el("span", null, "&#8226;")); li.appendChild(el("label", null, t)); ul.appendChild(li);
    });
    c.appendChild(ul);
    app.appendChild(c);
    app.appendChild(el("p", "muted", "Quer rodar em casa depois? O kit tem o passo a passo e o mesmo arquivo do Figma."));
    app.appendChild(backRow(function () { go("os"); }));
  }

  function viewStep(app, step, idx, total, kind) {
    app.className = "stage";
    var meta = el("div", "stepmeta");
    meta.appendChild(el("span", "n", (kind === "practice" ? "PRÁTICA " : "PASSO ") + (idx + 1) + " de " + total));
    if (step.est) meta.appendChild(el("span", "est", "~" + step.est));
    app.appendChild(meta);
    var h1 = el("h1", null, esc(step.title)); h1.tabIndex = -1;
    app.appendChild(h1);
    if (step.why) app.appendChild(el("div", "why", step.why));

    step.blocks.forEach(function (b) { app.appendChild(renderBlock(b)); });

    if (step.checklist && step.checklist.length) {
      var card = el("div", "checkcard");
      card.appendChild(el("div", "clabel", "Validação · marque o que você já vê"));
      var ul = el("ul", "checklist");
      var refresh = function () {
        var all = step.checklist.every(function (item, i) { return !!state.checked[kind + ":" + step.key + ":" + i]; });
        card.classList.toggle("complete", all);
      };
      step.checklist.forEach(function (item, i) {
        var id = kind + ":" + step.key + ":" + i;
        var li = el("li");
        var input = el("input"); input.type = "checkbox"; input.id = id; input.checked = !!state.checked[id];
        input.onchange = function () { state.checked[id] = input.checked; save(); refresh(); };
        var lb = el("label"); lb.setAttribute("for", id); lb.innerHTML = esc(item);
        li.appendChild(input); li.appendChild(lb); ul.appendChild(li);
      });
      card.appendChild(ul);
      card.appendChild(el("div", "allset", "✓ Tudo certo neste passo."));
      app.appendChild(card);
      refresh();
    }

    var actions = el("div", "actions");
    var next = el("button", "btn primary");
    next.innerHTML = (idx + 1 < total ? "Funcionou, próximo" : (kind === "setup" ? "Setup pronto, ir pra prática" : "Concluir")) + ' <span class="arrow" aria-hidden="true">→</span>';
    next.onclick = function () {
      state.done[kind + ":" + step.key] = true;
      if (idx + 1 < total) { if (kind === "setup") state.setupIdx = idx + 1; else state.practiceIdx = idx + 1; }
      else { go(kind === "setup" ? "practice" : "done"); return; }
      go(kind === "setup" ? "setup" : "practice");
    };
    var err = el("button", "btn ghost", "Deu erro");
    err.onclick = function () { openHelp(step); };
    var help = el("button", "btn help", "Preciso de ajuda");
    help.onclick = function () { openHelp(step); };
    actions.appendChild(next); actions.appendChild(err); actions.appendChild(help);
    app.appendChild(actions);

    if (idx > 0) app.appendChild(backRow(function () {
      if (kind === "setup") { state.setupIdx = idx - 1; go("setup"); }
      else { state.practiceIdx = idx - 1; go("practice"); }
    }));
  }

  function viewDone(app) {
    app.className = "stage center";
    app.appendChild(el("div", "eyebrow", "Pronto"));
    app.appendChild(el("h1", null, "Você fez o fluxo inteiro"));
    app.appendChild(el("p", "lede", "Figma Desktop conectado ao Claude Desktop pelo MCP. Leu um frame de verdade, gerou, comparou e corrigiu. Isso é o \"do Figma ao código\" sem handoff."));
    var c = el("div", "card");
    c.appendChild(el("h2", null, "Antes de sair"));
    c.appendChild(el("div", "note ok", "Restaure o projeto: npm run workshop:reset. Nada de credencial é apagado."));
    c.appendChild(el("div", "note warn", "Na máquina do evento: revogue seu token no Figma (Settings > Security > Revoke) e saia das suas contas."));
    var p = el("div", "prose"); p.appendChild(el("p", null, "Quer levar pra casa? O kit tem os 10 prompts, o arquivo do Figma, os scripts e o troubleshooting."));
    c.appendChild(p);
    app.appendChild(c);
    app.appendChild(backRow(function () { state.practiceIdx = practiceSteps().length - 1; go("practice"); }));
  }

  // ---------- botões utilitários ----------
  function choiceBtn(big, small, badge, badgeCls, onclick) {
    var b = el("button", "choice");
    var head = el("span", "big"); head.appendChild(el("span", null, esc(big))); head.appendChild(el("span", "arrow", "→"));
    b.appendChild(head);
    b.appendChild(el("span", "small", esc(small)));
    if (badge) b.appendChild(el("span", "badge " + (badgeCls || ""), esc(badge)));
    b.onclick = onclick;
    return b;
  }
  function backRow(onclick) {
    var d = el("div", "backrow");
    var b = el("button", "backbtn"); b.innerHTML = '<span aria-hidden="true">←</span> Voltar'; b.onclick = onclick;
    d.appendChild(b); return d;
  }
  function twoDeviceNote() {
    var d = el("div", "note neutral");
    d.innerHTML = "Abriu no celular? Perfeito pra ler. As ações são no computador: digite <b>" + esc(SHORT_URL) + "</b> lá pra abrir este mesmo guia. Seu progresso fica salvo em cada aparelho.";
    return d;
  }

  // ---------- ajuda ----------
  function openHelp(step) {
    lastFocus = document.activeElement;
    var ov = document.getElementById("helpOverlay");
    var mesa = document.getElementById("mesa");
    mesa.value = state.mesa || "";
    mesa.oninput = function () { state.mesa = mesa.value; save(); updateHelpSummary(step); };
    document.getElementById("cat").onchange = function () { updateHelpSummary(step); };
    updateHelpSummary(step);
    ov.classList.add("open");
    document.getElementById("helpClose").focus();
  }
  function closeHelp() {
    document.getElementById("helpOverlay").classList.remove("open");
    if (lastFocus && lastFocus.focus) { try { lastFocus.focus(); } catch (e) {} }
  }
  function updateHelpSummary(step) {
    var dev = state.device === "event" ? "Máquina do evento" : "Computador próprio";
    var os = state.os ? state.os : "-";
    document.getElementById("helpSummary").textContent =
      "Mesa: " + (state.mesa || "-") + "  |  " + dev + " / " + os + "  |  Etapa: " + (step ? step.title : "-") + "  |  Erro: " + document.getElementById("cat").value;
  }

  // ---------- roteamento ----------
  function go(view) { state.view = view; save(); render(); }

  function render() {
    var app = document.getElementById("app");
    app.innerHTML = "";
    if (state.view === "cover") viewCover(app);
    else if (state.view === "os") viewOs(app);
    else if (state.view === "linux") viewLinux(app);
    else if (state.view === "setup") {
      var s = setupSteps(); var i = Math.min(state.setupIdx, s.length - 1); state.setupIdx = i;
      viewStep(app, s[i], i, s.length, "setup");
    } else if (state.view === "practice") {
      var p = practiceSteps(); var j = Math.min(state.practiceIdx, p.length - 1); state.practiceIdx = j;
      viewStep(app, p[j], j, p.length, "practice");
    } else if (state.view === "done") viewDone(app);
    else viewCover(app);
    updateMeter();
    window.scrollTo(0, 0);
    var h = app.querySelector("h1[tabindex]");
    if (h) { try { h.focus({ preventScroll: true }); } catch (e) {} }
  }

  // ---------- init ----------
  document.getElementById("shortUrl").textContent = SHORT_URL;
  document.getElementById("copyUrl").onclick = function () { copyText("https://" + SHORT_URL, this); };
  document.getElementById("helpClose").onclick = closeHelp;
  document.getElementById("helpReserva").onclick = function () {
    closeHelp();
    var app = document.getElementById("app");
    app.className = "stage";
    app.innerHTML = "";
    app.appendChild(el("div", "eyebrow", "Máquina reserva"));
    var h1 = el("h1", null, "Migre em dois minutos"); h1.tabIndex = -1; app.appendChild(h1);
    app.appendChild(el("div", "note neutral", "Pegue uma máquina Reserva (identificada Reserva 1, 2, 3...). Ela já está ligada, com Figma, Claude, Node, o projeto e o plugin prontos. Você só entra nas suas contas, gera o token e conecta."));
    app.appendChild(backRow(function () { render(); }));
    document.getElementById("meterbox").hidden = true;
    try { h1.focus({ preventScroll: true }); } catch (e) {}
  };
  document.getElementById("helpOverlay").addEventListener("click", function (e) { if (e.target === this) closeHelp(); });
  document.addEventListener("keydown", function (e) { if (e.key === "Escape") closeHelp(); });

  load();
  render();
})();
</script>
</body>
</html>
