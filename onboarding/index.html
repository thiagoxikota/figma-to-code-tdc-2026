<style>
  /* ============================================================
     Do Figma ao código sem handoff · TDC 2026
     Assistente de setup. 100% offline (abre por file://), zero
     recurso externo. O token e digitado aqui e processado SO neste
     navegador pra montar o JSON: nao e transmitido, nao entra em URL,
     nao vai pra analytics e nao e persistido (nem localStorage nem
     sessionStorage). Some ao fechar a aba. Como a pagina nao carrega
     nenhum recurso externo, nao ha script de terceiro que possa le-lo.
     Sistema visual Xikota: vermilion #DC000C, ground washi claro,
     Ma (respiro), Kanso (uma coisa por tela), alto contraste real.
     ============================================================ */

  :root {
    /* ground washi + tinta */
    --bg: #F4F1EC;
    --bg-2: #EBE6DD;
    --sunk: #17130F;        /* poço escuro para código (contraste com washi) */
    --panel: #FFFFFF;
    --ink: #17130F;
    --ink-2: #4A423B;
    --ink-3: #6B6157;
    /* marca */
    --brand: #DC000C;
    --brand-deep: #A4000A;
    --brand-wash: rgba(220, 0, 12, 0.06);
    --on-brand: #FFFFFF;
    /* estado (sempre com ícone/texto, nunca só cor) */
    --ok: #1F7A44;
    --ok-wash: rgba(31, 122, 68, 0.10);
    --warn: #9A5B00;
    --warn-wash: rgba(154, 91, 0, 0.10);
    /* linhas e sombra (separação por luz, nunca por apagar) */
    --rule: #C3B7A6;
    --rule-2: #C9BEAE;
    --shadow: 0 1px 2px rgba(23,19,15,.05), 0 10px 30px -16px rgba(23,19,15,.20);
    --shadow-lift: 0 2px 4px rgba(23,19,15,.06), 0 18px 42px -18px rgba(23,19,15,.28);
    --focus: #DC000C;
    --font: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", "Roboto Mono", Menlo, Consolas, monospace;
    --maxw: 720px;
    --radius: 18px;
    --radius-sm: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14110E;
      --bg-2: #1B1611;
      --sunk: #0C0A08;
      --panel: #1F1A15;
      --ink: #F7F2EA;
      --ink-2: #D2C8BB;
      --ink-3: #9C9083;
      --brand: #FF4438;
      --brand-deep: #FF6A55;
      --brand-wash: rgba(255, 68, 56, 0.10);
      --on-brand: #14110E;
      --ok: #46C97A;
      --ok-wash: rgba(70, 201, 122, 0.12);
      --warn: #E8A94B;
      --warn-wash: rgba(232, 169, 75, 0.12);
      --rule: #3A322B;
      --rule-2: #4A4038;
      --shadow: 0 1px 2px rgba(0,0,0,.4), 0 12px 30px -16px rgba(0,0,0,.6);
      --shadow-lift: 0 2px 4px rgba(0,0,0,.5), 0 20px 44px -18px rgba(0,0,0,.7);
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  [hidden] { display: none !important; }
  html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
  body {
    background: var(--bg); color: var(--ink); font-family: var(--font);
    line-height: 1.55; font-size: 18px; -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility; min-height: 100vh;
    padding-bottom: 56px;
  }
  a { color: var(--brand-deep); text-underline-offset: 3px; }
  button { font-family: inherit; cursor: pointer; color: inherit; }
  :focus-visible { outline: 3px solid var(--focus); outline-offset: 3px; border-radius: 6px; }
  ::selection { background: var(--brand); color: var(--on-brand); }
  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 22px; }
  .hidden { display: none !important; }

  /* ---------- cabeçalho fino ---------- */
  .topbar {
    position: sticky; top: 0; z-index: 30;
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    -webkit-backdrop-filter: saturate(1.1) blur(10px);
    backdrop-filter: saturate(1.1) blur(10px);
    border-bottom: 1px solid var(--rule);
  }
  .topbar .bar {
    max-width: var(--maxw); margin: 0 auto; padding: 12px 22px;
    display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap;
  }
  .lockup { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .xmark { width: 20px; height: 20px; flex: 0 0 auto; display: block; }
  .xmark path { fill: var(--brand); }
  .xlockup { height: 40px; width: auto; display: block; margin-bottom: 24px; }
  .xlockup path { fill: var(--brand); }
  .lockup .name { font-size: 13px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink); white-space: nowrap; }
  .lockup .name .sep { color: var(--brand); padding: 0 6px; }
  .copybtn {
    background: var(--panel); color: var(--ink); border: 1.5px solid var(--rule-2);
    border-radius: 999px; padding: 7px 15px; font-weight: 700; font-size: 13px; min-height: 44px;
    display: inline-flex; align-items: center; gap: 7px; transition: border-color .15s, color .15s;
  }
  .copybtn:hover { border-color: var(--brand); }
  .resetbtn { color: var(--ink-2); }
  .resetbtn:hover { border-color: var(--brand); color: var(--brand-deep); }
  .copybtn.done { border-color: var(--ok); color: var(--ok); }
  .copybtn svg { width: 14px; height: 14px; }

  /* ---------- medidor de progresso ---------- */
  .meterbox { max-width: var(--maxw); margin: 0 auto; padding: 0 22px 12px; }
  .meterhead { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin: 4px 0 8px; }
  .meterhead .phase { font-size: 12px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--brand-deep); }
  .meterhead .count { font-size: 13px; font-weight: 700; color: var(--ink-3); }
  .segs { display: flex; gap: 6px; }
  .segs .seg { flex: 1; height: 7px; border-radius: 99px; background: var(--bg-2); box-shadow: inset 0 0 0 1px var(--rule); transition: background .25s; }
  .segs .seg.done { background: var(--brand); box-shadow: none; }
  .segs .seg.done.open { background: var(--brand-wash); box-shadow: inset 0 0 0 1.5px var(--brand); }
  .segs .seg.cur { background: var(--brand); height: 11px; box-shadow: 0 0 0 2px var(--ink); }

  /* ---------- palco ---------- */
  main { display: block; }
  .stage { max-width: var(--maxw); margin: 0 auto; padding: 26px 22px 0; }
  .stage.center { min-height: calc(100vh - 190px); display: flex; flex-direction: column; justify-content: center; }

  h1 { font-size: clamp(32px, 6vw, 52px); font-weight: 900; line-height: 1.02; letter-spacing: -1px; margin: 0 0 12px; }
  h1:focus-visible { outline: none; }
  h2 { font-size: clamp(21px, 4vw, 27px); font-weight: 900; line-height: 1.14; margin: 0 0 8px; }
  .eyebrow { font-size: 12.5px; font-weight: 800; letter-spacing: 2.5px; text-transform: uppercase; color: var(--brand-deep); margin-bottom: 14px; }
  .lede { font-size: clamp(17px, 2.4vw, 20px); color: var(--ink-2); line-height: 1.5; margin-bottom: 4px; max-width: 42ch; }

  /* respiro entre blocos: separação por espaço, não por régua fraca */
  .stage > * + * { margin-top: 20px; }

  /* ---------- capa ---------- */
  .cover { position: relative; }
  .cover > * { position: relative; z-index: 1; }
  .cover .choices { margin-top: 28px; }
  .cover .note { margin-top: 24px; }

  .choices { display: grid; gap: 20px; }
  @media (min-width: 620px) { .choices.two { grid-template-columns: 1fr 1fr; } }
  .choice {
    text-align: left; background: var(--panel); border: 1px solid var(--rule); border-radius: var(--radius);
    padding: 24px; color: var(--ink); display: flex; flex-direction: column; gap: 12px; min-height: 118px;
    box-shadow: var(--shadow); position: relative; overflow: hidden;
    transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  }
  .choice::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; background: var(--brand); transform: scaleY(0); transform-origin: top; transition: transform .18s ease; }
  .choice:hover { transform: translateY(-3px); box-shadow: var(--shadow-lift); border-color: var(--rule-2); }
  .choice:hover::before { transform: scaleY(1); }
  .choice .big { font-size: 22px; font-weight: 900; letter-spacing: -.3px; display: flex; align-items: flex-start; gap: 10px; line-height: 1.15; min-height: 2.3em; }
  .choice .big .arrow { color: var(--brand); font-weight: 900; margin-left: auto; transition: transform .15s; }
  .choice:hover .big .arrow { transform: translateX(4px); }
  .choice .small { font-size: 15px; color: var(--ink-2); line-height: 1.45; }
  .choice .badge { align-self: flex-start; margin-top: auto; font-size: 11.5px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; padding: 4px 10px; border-radius: 999px; margin-top: 2px; }
  .choice .badge.fast { background: var(--ok-wash); color: var(--ok); }
  .choice .badge.none { background: var(--brand-wash); color: var(--brand-deep); }

  /* ---------- passo ---------- */
  .stepmeta { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; margin-bottom: 4px; }
  .stepmeta .n { font-size: 12.5px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--brand-deep); }
  .stepmeta .est { font-size: 13px; font-weight: 700; color: var(--ink-3); display: inline-flex; align-items: center; gap: 6px; }
  .stepmeta .est::before { content: ""; width: 5px; height: 5px; border-radius: 50%; background: var(--rule-2); }

  .why { color: var(--ink); font-size: 16.5px; line-height: 1.5; background: var(--brand-wash); border-left: 4px solid var(--brand); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 14px 18px; }
  .why b { font-weight: 800; }

  .prose p { color: var(--ink-2); font-size: 17px; line-height: 1.55; }
  .prose p b { color: var(--ink); font-weight: 800; }

  .modal h3:focus, .modal h3:focus-visible { outline: none; box-shadow: none; }
  .modal .label { margin-top: 22px; margin-bottom: 10px; }
  .modal .label:first-of-type { margin-top: 14px; }
  .stepactions { display: flex; flex-direction: column; }

  /* navegacao ir/voltar: par de peso igual, nunca um link apagado */
  .navrow { display: flex; gap: 12px; align-items: stretch; }
  .navrow .btn { min-height: 56px; font-size: 16px; }
  .navrow .btn.primary { flex: 1 1 auto; }
  .btn.back {
    flex: 0 0 auto; background: var(--panel); color: var(--ink);
    border: 2px solid var(--rule-2); font-weight: 800; padding-left: 18px; padding-right: 22px;
  }
  .btn.back:hover { border-color: var(--brand); color: var(--brand-deep); }
  .btn.trouble {
    width: 100%; margin-top: 12px; min-height: 52px; background: var(--panel);
    color: var(--warn); border: 2px solid color-mix(in srgb, var(--warn) 45%, transparent); font-weight: 800;
  }
  .btn.trouble:hover { border-color: var(--warn); background: var(--warn-wash); }

  /* fluxo de socorro */
  .troublelist { display: flex; flex-direction: column; gap: 10px; margin: 4px 0 18px; }
  .troublerow {
    text-align: left; background: var(--panel); border: 2px solid var(--rule); border-radius: 14px;
    padding: 16px 18px; font-size: 16px; font-weight: 700; color: var(--ink); line-height: 1.4;
    display: flex; align-items: center; gap: 14px; transition: border-color .15s, transform .15s;
  }
  .troublerow:hover { border-color: var(--brand); transform: translateX(3px); }
  .troublerow .go { margin-left: auto; color: var(--brand); font-weight: 900; flex: 0 0 auto; }
  .fixsteps { display: flex; flex-direction: column; gap: 16px; counter-reset: fix; margin: 18px 0; }
  .fixsteps li {
    display: flex; gap: 16px; align-items: flex-start; font-size: 16.5px;
    line-height: 1.5; color: var(--ink); font-weight: 600;
  }
  .fixsteps li::before {
    counter-increment: fix; content: counter(fix); flex: 0 0 auto;
    width: 32px; height: 32px; border-radius: 50%; background: var(--brand); color: var(--on-brand);
    font-size: 15px; font-weight: 900; display: flex; align-items: center; justify-content: center;
  }
  .collective {
    background: var(--warn-wash); border: 2px solid var(--warn); border-radius: 12px;
    padding: 14px 16px; font-size: 15.5px; font-weight: 700; color: var(--ink); line-height: 1.45; margin-bottom: 16px;
  }
  .worked { background: var(--ok-wash); border: 2px solid var(--ok); border-radius: 12px; padding: 14px 16px; font-size: 15.5px; color: var(--ink); line-height: 1.45; font-weight: 600; }
  .worked b { color: var(--ok); }

  .ctxrow { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .ctxrow .ctx { font-size: 13px; font-weight: 800; letter-spacing: .4px; color: var(--ink-2); text-transform: uppercase; }
  .ctxrow .ctxlink { font-size: 13px; font-weight: 800; color: var(--brand-deep); text-decoration: underline; text-underline-offset: 3px; background: none; border: none; padding: 12px 8px; min-height: 44px; cursor: pointer; }
  .checklist li.plain { min-height: 0; align-items: flex-start; gap: 10px; }
  .checklist li.plain .bullet { color: var(--brand); font-weight: 900; }
  details.disc { border: 2px solid var(--rule); border-radius: 12px; padding: 0; background: var(--panel); margin-top: 14px; }
  details.disc > summary { cursor: pointer; padding: 16px 18px; font-weight: 800; font-size: 15.5px; color: var(--ink); list-style: none; min-height: 44px; display: flex; align-items: center; gap: 10px; }
  details.disc > summary::-webkit-details-marker { display: none; }
  details.disc > summary::before { content: "+"; color: var(--brand); font-weight: 900; font-size: 20px; flex: 0 0 auto; }
  details.disc[open] > summary::before { content: "\2212"; }
  details.disc > summary:hover { color: var(--brand-deep); }
  details.disc > .prose, details.disc > .troublelist { padding: 0 18px 18px; }

  /* código / json */
  .codeblock .label { font-size: 12px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--ink-3); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .codewrap { position: relative; }
  pre {
    background: var(--sunk); color: #F7F2EA; border-radius: var(--radius-sm); padding: 18px 16px;
    padding-right: 104px;
    white-space: pre-wrap; overflow-wrap: anywhere;
    overflow-x: auto; font-family: var(--mono); font-size: 14.5px; line-height: 1.55;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
  }
  .code-copy {
    position: absolute; top: 10px; right: 10px;
    background: #F7F2EA; color: #17130F; border-color: #F7F2EA;
    box-shadow: 0 0 0 4px var(--sunk), 0 2px 10px rgba(0,0,0,.45);
  }
  .code-copy:hover { background: #fff; border-color: #fff; }
  .code-copy.done { background: var(--ok); color: #fff; border-color: var(--ok); }
  .path { font-family: var(--mono); font-size: 14px; background: var(--sunk); color: #F7F2EA; border-radius: var(--radius-sm); padding: 13px 14px; padding-right: 92px; word-break: break-all; }

  /* notas de estado */
  .note { border-radius: var(--radius-sm); padding: 14px 16px 14px 46px; font-size: 15.5px; line-height: 1.5; position: relative; border: 1px solid; }
  .note::before { position: absolute; left: 15px; top: 14px; font-weight: 900; font-size: 15px; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--bg); }
  .note.neutral { background: var(--bg-2); border-color: var(--rule); color: var(--ink-2); padding-left: 16px; }
  .note.warn { background: var(--warn-wash); border-color: color-mix(in srgb, var(--warn) 40%, transparent); color: var(--ink); }
  .note.warn::before { content: "!"; background: var(--warn); }
  .note.ok { background: var(--ok-wash); border-color: color-mix(in srgb, var(--ok) 40%, transparent); color: var(--ink); }
  .note.ok::before { content: "✓"; background: var(--ok); }
  .note b { font-weight: 800; }

  /* diagrama honesto (trilha de menu, não screenshot fake) */
  .diagram { background: var(--panel); border: 1px solid var(--rule); border-radius: var(--radius-sm); padding: 18px; box-shadow: var(--shadow); }
  .diagram .dlabel { font-size: 12px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--ink-3); margin-bottom: 12px; }
  .trail { display: flex; flex-wrap: wrap; align-items: center; gap: 7px; }
  .trail .chip { font-size: 14px; font-weight: 700; color: var(--ink); background: var(--bg-2); border: 1px solid var(--rule-2); border-radius: 8px; padding: 7px 11px; white-space: nowrap; }
  .trail .chip.end { background: var(--brand-wash); color: var(--brand-deep); border: 1.5px solid var(--brand); font-weight: 800; }
  .trail .chev { color: var(--ink-3); font-weight: 900; }
  .diagram .dfoot { margin-top: 12px; font-size: 13.5px; color: var(--ink-3); }
  .fakefield { margin-top: 12px; display: flex; align-items: center; gap: 10px; background: var(--bg-2); border: 1px dashed var(--rule-2); border-radius: 8px; padding: 10px 12px; font-family: var(--mono); font-size: 14px; color: var(--ink-2); }
  .fakefield .dot { color: var(--brand); font-weight: 900; letter-spacing: 2px; }

  /* campo de token (local, nunca sai) */
  .tokenfield { background: var(--panel); border: 1px solid var(--rule); border-radius: var(--radius-sm); padding: 16px; box-shadow: var(--shadow); }
  .tokenfield .hint { font-size: 14px; color: var(--ink-2); line-height: 1.5; margin-bottom: 12px; }
  .tokenfield .hint b { color: var(--ink); font-weight: 800; }
  .tokenrow { display: flex; gap: 8px; align-items: center; }
  .tokenrow input {
    flex: 1; min-width: 0; background: var(--bg-2); border: 1.5px solid var(--ink-3); border-radius: 10px;
    color: var(--ink); font-family: var(--mono); font-size: 15px; padding: 12px; min-height: 48px;
  }
  .tokenrow input::placeholder { color: var(--ink-3); }
  .tokenrow .eye { background: var(--bg-2); border: 1.5px solid var(--ink-3); border-radius: 10px; color: var(--ink); padding: 0 14px; min-height: 48px; font-weight: 700; font-size: 14px; }
  .tokenrow .eye:hover { border-color: var(--brand); }

  /* checklist de validação */
  .checkcard { background: var(--panel); border: 1px solid color-mix(in srgb, var(--ok) 30%, var(--rule)); border-radius: var(--radius-sm); padding: 16px 18px; box-shadow: var(--shadow); }
  .checkcard .clabel { font-size: 12px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--ok); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .checklist { list-style: none; display: flex; flex-direction: column; gap: 12px; }
  .checklist li { display: flex; gap: 12px; align-items: center; min-height: 44px; }
  .checklist input { width: 26px; height: 26px; accent-color: var(--ok); flex: 0 0 auto; cursor: pointer; }
  .checklist label { font-size: 16.5px; color: var(--ink); line-height: 1.4; cursor: pointer; flex: 1; display: flex; align-items: center; min-height: 44px; }
  .checkcard .allset { margin-top: 12px; font-size: 13.5px; font-weight: 800; color: var(--ok); display: none; align-items: center; gap: 8px; }
  .checkcard.complete .allset { display: flex; }

  .link { display: inline-flex; align-items: center; gap: 8px; font-weight: 700; font-size: 16px; color: var(--brand-deep); background: var(--panel); border: 1px solid var(--rule); border-radius: var(--radius-sm); padding: 13px 16px; box-shadow: var(--shadow); transition: border-color .15s; text-decoration: none; }
  .link:hover { border-color: var(--brand); }
  .link .ext { margin-left: auto; color: var(--ink-3); font-size: 13px; }

  /* ações */
  .actions { display: flex; flex-wrap: wrap; gap: 12px; }
  .btn { border-radius: var(--radius-sm); padding: 14px 22px; font-weight: 800; font-size: 16.5px; border: 2px solid transparent; min-height: 52px; display: inline-flex; align-items: center; gap: 9px; transition: transform .12s, background .15s, border-color .15s; }
  .btn:active { transform: translateY(1px); }
  .btn.primary { background: var(--brand); color: var(--on-brand); box-shadow: 0 10px 24px -12px var(--brand); }
  .btn.primary:hover { background: var(--brand-deep); }
  .btn.ghost { background: var(--panel); color: var(--ink); border-color: var(--rule-2); }
  .btn.ghost:hover { border-color: var(--ink-3); }
  .btn.help { background: transparent; color: var(--warn); border-color: color-mix(in srgb, var(--warn) 55%, transparent); }
  .btn.help:hover { border-color: var(--warn); }
  .btn .arrow { font-weight: 900; }

  .backrow { margin-top: 8px; }
  .backbtn { background: transparent; border: none; color: var(--ink-3); font-weight: 700; font-size: 15px; padding: 8px 0; display: inline-flex; align-items: center; gap: 8px; min-height: 44px; }
  .backbtn:hover { color: var(--ink); }

  .muted { color: var(--ink-3); font-size: 15px; line-height: 1.5; }
  .card { background: var(--panel); border: 1px solid var(--rule); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
  .card > * + * { margin-top: 14px; }

  /* ---------- modal de ajuda ---------- */
  .overlay { position: fixed; inset: 0; background: rgba(23,19,15,0.55); z-index: 60; display: none; align-items: flex-end; justify-content: center; padding: 0; }
  @media (min-width: 620px) { .overlay { align-items: center; padding: 24px; } }
  .overlay.open { display: flex; }
  .modal {
    background: var(--panel); border: 1px solid var(--rule-2); border-top: 4px solid var(--brand);
    border-radius: var(--radius) var(--radius) 0 0; max-width: 520px; width: 100%; padding: 24px 22px 28px;
    max-height: 92vh; overflow-y: auto; box-shadow: var(--shadow-lift);
  }
  @media (min-width: 620px) { .modal { border-radius: var(--radius); } }
  .modal h3 { font-size: 24px; font-weight: 900; margin-bottom: 8px; }
  .modal .sub { color: var(--ink-2); font-size: 15.5px; line-height: 1.5; }
  .helpbanner { background: var(--brand); color: var(--on-brand); border-radius: var(--radius-sm); padding: 15px 16px; font-weight: 800; font-size: 17px; margin: 16px 0; display: flex; align-items: center; gap: 10px; }
  .helpbanner .hm { width: 12px; height: 12px; border-radius: 50%; background: var(--on-brand); flex: 0 0 auto; }
  .field { margin: 14px 0; }
  .field label { display: block; font-weight: 800; margin-bottom: 6px; font-size: 15px; }
  .field input, .field select { width: 100%; background: var(--bg-2); border: 1.5px solid var(--ink-3); border-radius: 10px; color: var(--ink); padding: 12px; font-size: 16px; min-height: 48px; }
  .helpsummary { font-family: var(--mono); font-size: 13px; color: var(--ink-2); background: var(--bg-2); border: 1px solid var(--rule); border-radius: 10px; padding: 12px; line-height: 1.5; margin: 12px 0 16px; }

  /* ---------- ajustes de contexto ---------- */
  .stepmeta .est.solo::before { display: none; }
  .modal .label { font-size: 12px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--ink-3); }
  .modal .troublelist .label { margin: 8px 0 0; }
  .badge.now { background: var(--bg-2); color: var(--ink-2); box-shadow: inset 0 0 0 1.5px var(--rule-2); }
  .choice.current { border-color: var(--ink-3); }
  .notecopy { margin-top: 12px; }
  .escmuted { margin: 18px 0 8px; font-size: 13.5px; font-weight: 800; letter-spacing: .4px; text-transform: uppercase; color: var(--ink-3); }
  .escnote { margin-top: 8px; font-size: 13.5px; color: var(--ink-3); line-height: 1.5; }
  .skiplink { margin-top: 18px; }

  @media (max-width: 640px) {
    .topbar .bar { padding: 10px 16px; }
    .meterbox { padding: 0 16px 10px; }
    pre { padding: 52px 16px 16px; }
    .path { padding-right: 84px; }
  }

  @media print {
    .topbar, .stepactions, .backrow, .code-copy, .btn { display: none !important; }
    body { padding-bottom: 0; background: #fff; }
    pre, .path { background: #fff; color: #000; box-shadow: none; border: 1px solid #888; }
  }

  /* ---------- animação (respeita reduce) ---------- */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  .stage > * { animation: fadeUp .34s ease both; }
  .stage > *:nth-child(2) { animation-delay: .03s; }
  .stage > *:nth-child(3) { animation-delay: .06s; }
  .stage > *:nth-child(4) { animation-delay: .09s; }
  .stage > *:nth-child(n+5) { animation-delay: .12s; }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; scroll-behavior: auto !important; }
  }

  var TROUBLE = [{"id":"login-figma-bloqueado","etapa":"login figma","sintoma":"Não consigo entrar no Figma. Ele pede código ou trava a verificação.","passos":["Peça o código de novo pelo botão de reenviar da própria tela do Figma.","Se o código não chegar em 30 segundos, tente entrar com o botão Continue with Google.","Se sua conta é corporativa e a empresa bloqueia, pare aqui e levante a mão.","Enquanto isso, sente do lado de alguém que já está logado e acompanhe a tela dele."],"sucesso":"O arquivo do workshop abre no Figma Desktop com seu nome de usuário no canto.","escalar":"Depois de 1 tentativa de reenvio de código sem sucesso, ou se for 2FA sem o celular em mãos. Não insista.","coletivo":false},{"id":"login-claude-bloqueado","etapa":"login claude","sintoma":"Não consigo entrar no Claude Desktop.","passos":["Feche o Claude por completo. No macOS use Cmd+Q. No Windows saia pelo ícone da bandeja, perto do relógio.","Abra de novo e tente o login uma vez.","Se pedir verificação por e-mail e você não tem acesso ao e-mail agora, pare.","Levante a mão e junte com a dupla do lado."],"sucesso":"Você vê a tela de conversa do Claude com o campo de mensagem disponível.","escalar":"Uma tentativa de login falhou. Login corporativo travado não se resolve na sala.","coletivo":false},{"id":"login-conta-errada","etapa":"login figma","sintoma":"Entrei com a conta errada. Não vejo o arquivo do workshop.","passos":["No Figma Desktop, clique no seu avatar no canto superior.","Clique em Log out.","Entre com a conta pessoal que você usou para duplicar o arquivo da demo.","Abra de novo a sua cópia do arquivo da demo."],"sucesso":"O arquivo da demo aparece na sua lista de arquivos recentes e abre.","escalar":"Se você trocou de conta e o arquivo continua sumido, chame apoio. Pode ser que a duplicação não tenha sido salva.","coletivo":false},{"id":"figma-navegador-em-vez-de-desktop","etapa":"plugin","sintoma":"Estou com o Figma aberto no navegador. Nada conecta.","passos":["Feche a aba d , Personal access tokens, Generate new token.","Cole o token novo, salve o arquivo, feche o Claude por completo e abra de novo."],"sucesso":"Você pede Verifique o status da conexão com o Figma e a resposta traz o nome do seu arquivo aberto.","escalar":"Você gerou um token novo uma vez e ainda recusa. Pare e chame apoio.","coletivo":false},{"id":"nao-acho-edit-config","etapa":"config","sintoma":"Não acho onde editar a configuração do Claude.","passos":["No Claude Desktop, abra Settings e depois Developer, e clique em Edit Config.","Se esse botão não existir na sua versão, abra o arquivo direto. No macOS use o Finder, menu Ir, Ir para a pasta, e cole ~/Library/Application Support/Claude/claude_desktop_config.json.","No Windows, abra o Explorador, cole %APPDATA%\\Claude na barra de endereço e abra o arquivo claude_desktop_config.json.","Abra esse arquivo em um editor de texto simples, não no Word."],"sucesso":"Você está vendo um arquivo de texto com chaves e aspas, e consegue digitar nele.","escalar":"Se a pasta Claude não existe, é porque o Claude Desktop nunca abriu nessa máquina. Abra o Claude uma vez e tente de novo. Se ainda assim não existir, chame apoio.","coletivo":false},{"id":"config-json-invalido","etapa":"config","sintoma":"Salvei o arquivo e o Claude reclama do formato, ou nada carrega.","passos":["Procure vírgula sobrando antes de um fecha chaves. Esse é o erro mais comum.","Confira se toda aspa que abre também fecha, e se são aspas retas e não curvas.","Confira que existe a chave mcpServers com figma-console dentro, command igual a npx e args igual a [\"-y\", \"figma-console-mcp@1.35.0\"].","Salve, feche o Claude por completo e abra de novo."],"sucesso":"O Claude abre normal e o figma-console aparece na lista de conectores.","escalar":"Você corrigiu o arquivo uma vez e ainda não sobe. Não fique caçando vírgula. Chame apoio.","coletivo":false},{"id":"config-versao-latest","etapa":"config","sintoma":"Funcionava ontem e hoje quebrou sozinho.","passos":["Abr "id":"node-velho-ou-ausente","etapa":"config","sintoma":"Aparece erro dizendo que o comando não foi encontrado ou que meu Node é antigo.","passos":["Você não vai resolver isso pela página. Precisa de terminal e de permissão.","Se acabou de instalar o Node, feche o Claude Desktop por completo e abra de novo, para ele pegar o caminho novo.","Se isso não resolver, pare. Instalar Node não cabe nos 25 minutos.","Levante a mão e diga que é problema de Node."],"sucesso":"Depois de reabrir o Claude, o figma-console aparece na lista de conectores.","escalar":"Reabriu o Claude uma vez e continua o mesmo erro. Chame apoio na hora. Esse caso tem prioridade para máquina reserva.","coletivo":false},{"id":"npx-demorando","etapa":"config","sintoma":"Reiniciei o Claude e o conector demora muito para aparecer.","passos":["Espere até 60 segundos depois de abrir o Claude. Na primeira vez ele baixa o pacote.","Não reinicie no meio do download. Isso recomeça tudo.","Passou de 60 segundos, feche por completo e abra de novo uma única vez.","Enquanto espera, deixe o Figma Desktop e o arquivo já abertos."],"sucesso":"O figma-console aparece na lista e o pedido de status responde.","escalar":"Se demorar em muita gente ao mesmo tempo, é a rede. Não chame apoio individualmente. Avise em voz alta que está lento para vários.","coletivo":true},{"id":"rede-lenta","etapa":"config","sintoma":"Está tudo lento: login, download, geração.","passos":["Olhe em volta. Se a mesa toda está lenta, é a rede, não a sua máquina.","Avise em voz alta que está lento para vários, não levante a mão como caso individual.","Continue o que é local: a leitura do frame e a inspeção no Figma não dependem de rede.","Acompanhe a demonstração do palco enquanto a rede não volta."],"sucesso":"As ações locais no Figma seguem funcionando e você continua acompanhando o exercício.","escalar":"Não escale individualmente. Rede lenta é decisão de palco.","coletivo":true},{"id":"estou-no-linux","etapa":"login claude","sintoma":"Estou no Linux.","passos":["Pare o setup agora. Esse fluxo não fecha no Linux.","Não gaste tempo tentando adaptar o caminho do arquivo de configuração.","Sente com alguém em macOS ou Windows e siga em dupla.","Avise o apoio que você está no Linux para entrar na fila de máquina reserva."],"sucesso":"Você está acompanhando o exercício em uma tela que funciona, seja a da dupla ou a da reserva.","escalar":"Avise imediatamente, nos primeiros cinco minutos. Linux tem prioridade um na máquina reserva.","coletivo":false},{"id":"revogar-token","etapa":"revogar","sintoma":"Não consigo revogar o token no fim do workshop.","passos":["No Figma, clique no avatar, Settings, aba Security.","Vá em Personal access tokens e ache o token do workshop pelo nome.","Clique no menu de três pontos ao lado dele e escolha Revoke.","Confirme. Se estiver em máquina do evento, apague também a linha do token no arquivo de configuração do Claude."],"sucesso":"O token some da lista de Personal access tokens.","escalar":"Se você não acha o token na lista, chame apoio antes de sair da sala. Não deixe credencial em máquina do evento.","coletivo":false},{"id":"remover-mcp-da-maquina-do-evento","etapa":"revogar","sintoma":"Preciso deixar a máquina do evento limpa e não sei o que apagar.","passos":["Abra o arquivo de configuração do Claude pelo caminho do seu sistema.","Apague o bloco figma-console inteiro de dentro de mcpServers.","Salve e feche o Claude por completo.","Saia da sua conta no Figma e no Claude antes de deixar a máquina."],"sucesso":"O arquivo não tem mais nenhuma linha com figd_ e nenhuma conta sua está logada.","escalar":"Se você não conseguir editar o arquivo, chame apoio antes de sair. Não deixe a máquina com seu token.","coletivo":false}];

  function troubleFor(stepKey) {
    var alias = STEP_ALIAS[stepKey] || {};
    var mine = [], rest = [];
    for (var i = 0; i < TROUBLE.length; i++) {
      var t = TROUBLE[i];
      var k = ETAPA_KEY[t.etapa];
      (k === stepKey || alias[k] ? mine : rest).push(t);
    }
    return { mine: mine, rest: rest };
  }

  // ---- estado (token NUNCA entra aqui nem no localStorage) ----
  var state = { view: "cover", device: null, os: null, setupIdx: 0, practiceIdx: 0, checked: {}, mesa: "", osFrom: null, reservaFrom: null };
  var tokenLocal = ""; // só na memória da aba, nunca persistido, nunca enviado
  var tokenRevelado = false; // token fica MASCARADO na tela por padrão (máquina compartilhada)
  var lastFocus = null;

  function save() {
    try {
      localStorage.setItem(STORAGE, JSON.stringify({
        view: state.view, device: state.device, os: state.os,
        setupIdx: state.setupIdx, practiceIdx: state.practiceIdx,
        checked: state.checked, mesa: state.mesa,
        osFrom: state.osFrom, reservaFrom: state.reservaFrom
      }));
    } catch (e) {}
  }
  function load() {
    try {
      var s = JSON.parse(localStorage.getItem(STORAGE) || "null");
      if (s && typeof s === "object") { for (var k in s) if (k in state) state[k] = s[k]; }
    } catch (e) {}
  }

  function detectOs() {
    // celular e tablet nao contam como maquina do exercicio: quem le no
    // celular escolhe o sistema do COMPUTADOR na tela "Qual sistema?".
    var p = (navigator.platform || "").toLowerCase();
    var ua = (navigator.userAgent || "").toLowerCase();
    if (ua.indexOf("android") > -1 || ua.indexOf("iphone") > -1 || ua.indexOf("ipad") > -1 || ua.indexOf("mobile") > -1) return "phone";
    if (p.indexOf("win") > -1) return "windows";
    if (p.indexOf("linux") > -1) return "linux";
    return "mac";
  }

  // ---------- passos de setup por rota ----------
  function isMac() { return state.os === "mac"; }
  function osPath(win, mac) { return isMac() ? mac : win; }

      if (idx > 0) {
        if (kind === "setup") { state.setupIdx = idx - 1; go("setup"); }
        else { state.practiceIdx = idx - 1; go("practice"); }
      } else if (kind === "setup") {
        go(state.device === "own" ? "prereq" : "cover");
      } else {
        state.setupIdx = setupSteps().length - 1; go("setup");
      }
    };
    nav.appendChild(back);
    nav.appendChild(next);
    actions.appendChild(nav);

    if (step.key !== "p-concluir") {
      var trouble = el("button", "btn trouble", "Travou aqui? Ver o que fazer");
      trouble.type = "button";
      trouble.onclick = function () { openHelp(step); };
      actions.appendChild(trouble);
    }
    app.appendChild(actions);
  }

  function viewDone(app) {
    app.className = "stage center";
    app.appendChild(el("div", "eyebrow", "Pronto"));
    var h1d = el("h1", null, "Você fez o fluxo inteiro"); h1d.tabIndex = -1;
    app.appendChild(h1d);
    app.appendChild(el("p", "lede", "Figma Desktop conectado ao Claude Desktop pelo MCP. Leu um frame de verdade, gerou, comparou e corrigiu. Isso é o \"do Figma ao código\" sem handoff."));
    var c = el("div", "card");
    c.appendChild(el("h2", null, "Antes de sair da sala"));
    c.appendChild(el("div", "note warn", "<b>1. Revogue o seu token</b> no Figma: Settings > Security > Personal access tokens > Revoke. Isso é o que de fato mata o acesso."));
    c.appendChild(el("div", "note warn", "<b>2. Feche esta aba do guia.</b> O token que você colou vive só nela, e sumir daqui é o que garante que ele não fica na máquina."));
    c.appendChild(el("div", "note neutral", "<b>3. Na máquina do evento:</b> apague o bloco figma-console do arquivo de configuração do Claude e saia das suas contas no Figma e no Claude."));
    var p = el("div", "prose"); p.appendChild(el("p", null, "Quer levar pra casa? O kit tem os 10 prompts, o arquivo do Figma, os scripts e o troubleshooting."));
    c.appendChild(p);
    app.appendChild(c);
    app.appendChild(backRow(function () { state.practiceIdx = practiceSteps().length - 1; go("practice"); }));
  }

  // ---------- botões utilitários ----------
  function choiceBtn(big, small, badge, badgeCls, onclick) {
    var b = el("button", "choice");
    var head = el("span", "big"); head.appendChild(el("span", null, esc(big))); head.appendChild(el("span", "arrow", "→"));
    b.appendChild(head);
    b.appendChild(el("span", "small", esc(small)));
    if (badge) b.appendChild(el("span", "badge " + (badgeCls || ""), esc(badge)));
    b.onclick = onclick;
    return b;
  }
  function backRow(onclick) {
    var d = el("div", "backrow");
    var b = el("button", "backbtn"); b.innerHTML = '<span aria-hidden="true">←</span> Voltar'; b.onclick = onclick;
    d.appendChild(b); return d;
  }
  function osLabel() { return state.os === "mac" ? "macOS" : (state.os === "linux" ? "Linux" : "Windows"); }

  function contextoRow() {
    var d = el("div", "ctxrow");
    d.appendChild(el("span", "ctx", (state.device === "event" ? "Máquina do evento" : "Meu computador") + " · " + osLabel()));
    var t = el("button", "ctxlink", "trocar"); t.type = "button";
    t.onclick = function () { state.osFrom = state.view; go("os"); };
    d.appendChild(t);
    return d;
  }

  // Pre-requisitos saem do relogio da sala: e coisa pra fazer ANTES de quinta.
  function viewPrereq(app) {
    app.className = "stage";
    app.appendChild(contextoRow());
    app.appendChild(el("div", "eyebrow", "Antes de começar"));
    var h1 = el("h1", null, "Três coisas instaladas"); h1.tabIndex = -1; app.appendChild(h1);
    app.appendChild(el("div", "why", "Isto <b>não conta no relógio da sala</b>. Se faltar alguma, instalar agora come o seu setup inteiro. Confira e siga."));
    var c = el("div", "card");
    var ul = el("ul", "checklist");
    [["Figma Desktop", "https://www.figma.com/downloads/"],
     ["Claude Desktop", "https://claude.ai/download"],
     ["Node 18 ou mais novo", "https://nodejs.org"]].forEach(function (par) {
      var li = el("li");
      var a = el("a", "link"); a.href = par[1]; a.target = "_blank"; a.rel = "noopener noreferrer";
      a.appendChild(el("span", null, esc(par[0])));
      a.appendChild(el("span", "ext", "abre em nova aba"));
      li.appendChild(a); ul.appendChild(li);
    });
    c.appendChild(ul);
    app.appendChild(c);
    app.appendChild(el("div", "note warn", "Numa máquina do trabalho pode faltar permissão pra instalar. Se for o seu caso, não insista: senta em dupla ou pede uma máquina reserva. Você participa igual."));
    var nav = el("div", "navrow");
    var back = el("button", "btn back", '<span aria-hidden="true">\u2190</span> Voltar'); back.type = "button";
    back.onclick = function () { state.device = null; go("cover"); };
    var ok = el("button", "btn primary", 'Os três estão instalados <span class="arrow" aria-hidden="true">\u2192</span>'); ok.type = "button";
    ok.onclick = function () { go("setup"); };
    nav.appendChild(back); nav.appendChild(ok);
    app.appendChild(nav);
  }

  function twoDeviceNote() {
    var d = el("div", "note neutral");
    d.innerHTML = "Abriu no celular? Perfeito pra ler. As ações são no computador: digite <b>" + esc(SHORT_URL) + "</b> lá pra abrir este mesmo guia. Seu progresso fica salvo em cada aparelho.";
    var row = el("div", "notecopy");
    var b = copyBtn("", function () { return "https://" + SHORT_URL; });
    b.setAttribute("data-lbl", "Copiar o link");
    setLabel(b, "Copiar o link");
    row.appendChild(b);
    d.appendChild(row);
    return d;
  }

  // ---------- socorro: sintoma -> conserto guiado -> so entao chamar apoio ----------
  var helpCtx = { step: null, item: null };

  var modalPushed = false;
  function setInert(on) {
    var mn = document.querySelector("main"); if (mn) mn.inert = on;
    var tb = document.querySelector(".topbar"); if (tb) tb.inert = on;
  }
  function isOverlayOpen() { return document.getElementById("helpOverlay").classList.contains("open"); }
  function openOverlay(renderFn) {
    lastFocus = document.activeElement;
    renderFn();
    document.getElementById("helpOverlay").classList.add("open");
    setInert(true);
    document.body.style.overflow = "hidden";
    try { history.pushState(null, "", location.href); modalPushed = true; } catch (e) { modalPushed = false; }
  }
  function openHelp(step) {
    helpCtx.step = step; helpCtx.item = null;
    openOverlay(function () { renderHelp("list"); });
  }
  // viaNav=true quando o fechamento vem de navegacao (popstate, troca de view):
  // nesses casos o historico fica como esta.
  function closeHelp(viaNav) {
    if (!isOverlayOpen()) return;
    document.getElementById("helpOverlay").classList.remove("open");
    setInert(false);
    document.body.style.overflow = "";
    if (lastFocus && lastFocus.focus) { try { lastFocus.focus(); } catch (e) {} }
    if (viaNav !== true && modalPushed) { modalPushed = false; try { history.back(); } catch (e) {} }
    modalPushed = false;
  }

  function renderHelp(view) {
    var m = document.getElementById("helpModal");
    m.innerHTML = "";
    if (view === "list") helpList(m);
    else if (view === "fix") helpFix(m);
    else helpEscalate(m);
    var f = m.querySelector("h3"); if (f) { f.id = "helpTitle"; f.tabIndex = -1; try { f.focus({ preventScroll: true }); } catch (e) {} }
    m.scrollTop = 0;
  }

  function helpList(m) {
    var step = helpCtx.step;
    m.appendChild(el("h3", null, "O que travou?"));
    m.appendChild(el("p", "sub", "Escolha o que está acontecendo. Quase tudo aqui você resolve sozinho em menos de um minuto."));
    var sets = troubleFor(step ? step.key : null);
    function row(t) {
      var b = el("button", "troublerow", esc(t.sintoma) + '<span class="go" aria-hidden="true">\u2192</span>');
      b.type = "button";
      b.onclick = function () { helpCtx.item = t; renderHelp("fix"); };
      return b;
    }
    function grouped(list) {
      var box = el("div", "troublelist"), last = null;
      list.forEach(function (t) {
        if (t.etapa !== last) { box.appendChild(el("div", "label", esc(ETAPA_LABEL[t.etapa] || t.etapa))); last = t.etapa; }
        box.appendChild(row(t));
      });
      return box;
    }
    if (sets.mine.length) {
      m.appendChild(el("div", "label", "Neste passo"));
      var mb = el("div", "troublelist");
      sets.mine.forEach(function (t) { mb.appendChild(row(t)); });
      m.appendChild(mb);
      if (sets.rest.length) {
        var dt = el("details", "disc");
        dt.appendChild(el("summary", null, "Outro problema? Ver a lista completa (" + sets.rest.length + ")"));
        dt.appendChild(grouped(sets.rest));
        m.appendChild(dt);
      }
    } else {
      m.appendChild(el("div", "label", "Problemas conhecidos"));
      m.appendChild(grouped(sets.rest));
    }
    var other = el("button", "btn trouble", "Não achei o meu problema, chamar apoio");
    other.type = "button";
    other.onclick = function () { helpCtx.item = null; renderHelp("escalate"); };
    m.appendChild(other);
    var close = el("button", "btn back", "Fechar e voltar pro passo");
    close.type = "button"; close.style.width = "100%"; close.style.marginTop = "10px";
    close.onclick = function () { closeHelp(); };
    m.appendChild(close);
  }

  function helpFix(m) {
    var t = helpCtx.item;
    m.appendChild(el("h3", null, esc(t.sintoma)));
    if (t.coletivo) {
      m.appendChild(el("div", "collective",
        "Isso costuma pegar várias pessoas ao mesmo tempo. Se o vizinho está no mesmo problema, NÃO chame apoio individualmente: avise em voz alta que é geral. Um problema coletivo se resolve no palco, não bancada por bancada."));
    }
    var ol = el("ol", "fixsteps");
    t.passos.forEach(function (p) { ol.appendChild(el("li", null, esc(p))); });
    m.appendChild(ol);
    m.appendChild(el("div", "worked", "<b>Funcionou se:</b> " + esc(t.sucesso)));

    var ok = el("button", "btn primary", "Resolveu, voltar pro passo");
    ok.type = "button"; ok.style.width = "100%"; ok.style.marginTop = "18px";
    ok.onclick = function () { closeHelp(); };
    m.appendChild(ok);

    var esc_ = el("button", "btn trouble", "Não resolveu, chamar apoio");
    esc_.type = "button";
    esc_.onclick = function () { renderHelp("escalate"); };
    m.appendChild(esc_);

    var back = el("button", "btn back", '<span aria-hidden="true">\u2190</span> Ver outros problemas');
    back.type = "button"; back.style.width = "100%"; back.style.marginTop = "10px";
    back.onclick = function () { renderHelp("list"); };
    m.appendChild(back);
  }

  function helpEscalate(m) {
    var t = helpCtx.item, step = helpCtx.step;
    m.appendChild(el("h3", null, "Chamar apoio"));
    m.appendChild(el("p", "sub", "Levante a mão e pare de mexer na configuração. Mostre esta tela pra quem chegar."));
    if (t && t.escalar) m.appendChild(el("div", "collective", "<b>Quando escalar:</b> " + esc(t.escalar)));
    m.appendChild(el("div", "helpbanner", '<span class="hm" aria-hidden="true"></span>Aguarde o apoio. Não mude mais nada agora.'));

    var f = el("div", "field");
    f.appendChild(el("label", null, "Mesa / máquina"));
    var inp = document.createElement("input");
    inp.type = "text"; inp.id = "mesa"; inp.placeholder = "ex: Fila 2, máquina 7 (ou Reserva 1)";
    inp.value = state.mesa || "";
    f.appendChild(inp);
    m.appendChild(f);

    var sum = el("div", "helpsummary");
    function upd() {
      var dev = state.device === "event" ? "Máquina do evento" : "Computador próprio";
      sum.textContent = "Mesa: " + (state.mesa || "-") + "  |  " + dev + " / " + (state.os || "-") +
        "  |  Etapa: " + (step ? step.title : "-") + "  |  Problema: " + (t ? t.sintoma : "não listado");
    }
    inp.oninput = function () { state.mesa = inp.value; save(); upd(); };
    upd();
    m.appendChild(sum);

    var back = el("button", "btn back", '<span aria-hidden="true">\u2190</span> Voltar');
    back.type = "button"; back.style.width = "100%"; back.style.marginTop = "16px";
    back.onclick = function () { renderHelp(t ? "fix" : "list"); };
    m.appendChild(back);

    m.appendChild(el("div", "escmuted", "O palco indicou uma máquina reserva?"));
    var res = el("button", "btn ghost", "Ir para máquina reserva");
    res.type = "button"; res.style.width = "100%";
    res.onclick = goReserva;
    m.appendChild(res);
    m.appendChild(el("div", "escnote", "Nada é apagado agora. A troca só acontece quando você confirmar na tela seguinte."));
  }

  function resetTudo(msg) {
    try { localStorage.removeItem(STORAGE); } catch (e) {}
    tokenLocal = ""; tokenRevelado = false;
    state = { view: "cover", device: null, os: null, setupIdx: 0, practiceIdx: 0, checked: {}, mesa: state.mesa || "", osFrom: null, reservaFrom: null };
    go("cover");
    if (msg) { var a = document.getElementById("app"); var n = el("div", "note ok", msg); a.insertBefore(n, a.firstChild); }
  }
  function renderConfirmReset() {
    var m = document.getElementById("helpModal");
    m.innerHTML = "";
    m.appendChild(el("h3", null, "Recomeçar do zero?"));
    m.appendChild(el("p", "sub", "Apaga o progresso salvo nesta máquina e volta pro início. Use quando a máquina passar pra outra pessoa."));
    var ok = el("button", "btn trouble", "Apagar tudo e recomeçar");
    ok.type = "button"; ok.style.width = "100%"; ok.style.marginTop = "18px";
    ok.onclick = function () { closeHelp(true); resetTudo("Tudo limpo. Comece escolhendo como você vai participar."); };
    m.appendChild(ok);
    var back = el("button", "btn back", "Cancelar");
    back.type = "button"; back.style.width = "100%"; back.style.marginTop = "10px";
    back.onclick = function () { closeHelp(); };
    m.appendChild(back);
    var f = m.querySelector("h3"); if (f) { f.id = "helpTitle"; f.tabIndex = -1; try { f.focus({ preventScroll: true }); } catch (e) {} }
    m.scrollTop = 0;
  }

  function goReserva() {
    closeHelp(true);
    state.reservaFrom = state.view;
    go("reserva");
  }

  function viewReserva(app) {
    app.className = "stage";
    app.appendChild(el("div", "eyebrow", "Máquina reserva"));
    var h1 = el("h1", null, "Migre em dois minutos"); h1.tabIndex = -1; app.appendChild(h1);
    app.appendChild(el("div", "note neutral", "Pegue uma máquina Reserva (identificada Reserva 1, 2, 3...). Ela já está ligada, com Figma Desktop, Claude Desktop e o plugin Bridge prontos, e a configuração já escrita. <b>Você entra nas suas contas, gera um token novo e troca uma linha do arquivo de configuração, que já vai estar aberto pra você.</b>"));
    app.appendChild(el("div", "note warn", "Nada foi apagado ainda. Ao confirmar abaixo, os passos marcados nesta máquina são desmarcados e o guia recomeça pelo Token, no modo máquina do evento (Windows)."));
    var ir = el("button", "btn primary", "Começar na reserva");
    ir.type = "button"; ir.style.width = "100%";
    ir.onclick = function () {
      tokenLocal = ""; tokenRevelado = false;
      state.device = "event"; state.os = "windows";
      state.setupIdx = 1; state.practiceIdx = 0; state.checked = {};
      state.reservaFrom = null;
      go("setup");
    };
    app.appendChild(ir);
    app.appendChild(backRow(function () {
      var f = state.reservaFrom; state.reservaFrom = null;
      go(f && f !== "reserva" ? f : "cover");
    }));
  }

  // ---------- roteamento (view espelhada no hash: back do navegador e deep link) ----------
  function go(view) { state.view = view; save(); render(); setHash(currentHash()); }

  var HASH_IN = { capa: "cover", sistema: "os", linux: "linux", antes: "prereq", setup: "setup", pratica: "practice", pronto: "done", reserva: "reserva" };
  function currentHash() {
    if (state.view === "setup") return "#setup/" + (state.setupIdx + 1);
    if (state.view === "practice") return "#pratica/" + (state.practiceIdx + 1);
    var out = { cover: "capa", os: "sistema", linux: "linux", prereq: "antes", done: "pronto", reserva: "reserva" };
    return "#" + (out[state.view] || "capa");
  }
  function setHash(h) {
    if (location.hash === h) return;
    try { history.pushState(null, "", h); } catch (e) {}
  }
  function applyHash(raw) {
    var h = String(raw || "").replace(/^#/, "");
    if (!h) return false;
    var parts = h.split("/");
    var v = HASH_IN[parts[0]];
    if (!v) return false;
    var si = state.setupIdx, pi = state.practiceIdx;
    if (v === "setup") { var i = parseInt(parts[1], 10); si = isNaN(i) ? 0 : Math.min(Math.max(i - 1, 0), setupSteps().length - 1); }
    if (v === "practice") { var j = parseInt(parts[1], 10); pi = isNaN(j) ? 0 : Math.min(Math.max(j - 1, 0), practiceSteps().length - 1); }
    if (v === state.view && si === state.setupIdx && pi === state.practiceIdx) return false;
    state.view = v; state.setupIdx = si; state.practiceIdx = pi;
    return true;
  }
  window.addEventListener("popstate", function () {
    if (isOverlayOpen()) closeHelp(true);
    if (applyHash(location.hash)) { save(); render(); }
  });

  function render() {
    var app = document.getElementById("app");
    app.innerHTML = "";
    if (state.view === "cover") viewCover(app);
    else if (state.view === "os") viewOs(app);
    else if (state.view === "linux") viewLinux(app);
    else if (state.view === "prereq") viewPrereq(app);
    else if (state.view === "reserva") viewReserva(app);
    else if (state.view === "setup") {
      var s = setupSteps(); var i = Math.min(state.setupIdx, s.length - 1); state.setupIdx = i;
      viewStep(app, s[i], i, s.length, "setup");
    } else if (state.view === "practice") {
      var pr = practiceSteps(); var j = Math.min(state.practiceIdx, pr.length - 1); state.practiceIdx = j;
      viewStep(app, pr[j], j, pr.length, "practice");
    } else if (state.view === "done") viewDone(app);
    else viewCover(app);
    updateMeter();
    var rb = document.getElementById("btnReset");
    if (rb) rb.hidden = state.view === "cover" && !state.device && !Object.keys(state.checked || {}).length;
    var tt = "Prepare sua máquina";
    if (state.view === "setup") tt = setupSteps()[state.setupIdx].title;
    else if (state.view === "practice") tt = practiceSteps()[state.practiceIdx].title;
    else if (state.view === "done") tt = "Pronto";
    else if (state.view === "reserva") tt = "Máquina reserva";
    else if (state.view === "prereq") tt = "Antes de começar";
    else if (state.view === "os") tt = "Qual sistema?";
    document.title = tt + " · Do Figma ao código sem handoff · TDC 2026";
    var de = document.documentElement, prevSB = de.style.scrollBehavior;
    de.style.scrollBehavior = "auto";
    window.scrollTo(0, 0);
    de.style.scrollBehavior = prevSB;
    var h = app.querySelector("h1[tabindex]");
    if (h) { try { h.focus({ preventScroll: true }); } catch (e) {} }
  }

  // ---------- init ----------
  document.getElementById("btnReset").onclick = function () { openOverlay(renderConfirmReset); };
  document.getElementById("helpOverlay").addEventListener("click", function (e) { if (e.target === this) closeHelp(); });
  document.addEventListener("keydown", function (e) { if (e.key === "Escape") closeHelp(); });

  load();
  if (applyHash(location.hash)) save();
  render();
  try { history.replaceState(null, "", currentHash()); } catch (e) {}
})();
</script>
</body>
</html>
